<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Registru Depozit</title>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg-deep: #0a0f1e;
    --bg-mid: #0d1630;
    --glass-bg: rgba(255,255,255,0.04);
    --glass-border: rgba(255,255,255,0.10);
    --glass-hover: rgba(255,255,255,0.07);
    --accent-blue: #4f8ef7;
    --accent-cyan: #38e8c8;
    --accent-violet: #a78bfa;
    --accent-rose: #f87171;
    --accent-amber: #fbbf24;
    --text-primary: #e8edf8;
    --text-secondary: #8899bb;
    --text-muted: #445577;
    --shadow-glass: 0 8px 32px rgba(0,0,0,0.4), 0 1px 0 rgba(255,255,255,0.06) inset;
    --shadow-hover: 0 16px 48px rgba(0,0,0,0.5), 0 1px 0 rgba(255,255,255,0.10) inset;
    --radius-lg: 18px;
    --radius-md: 13px;
    --radius-sm: 9px;
  }

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Sora', sans-serif;
  background: var(--bg-deep);
  color: var(--text-primary);
  min-height: 100vh;
  overflow-x: hidden;
}

body::before {
  content: '';
  position: fixed;
  inset: 0;
  background:
    radial-gradient(ellipse 70% 55% at 15% 0%, rgba(248,113,113,0.09) 0%, transparent 60%),
    radial-gradient(ellipse 55% 45% at 85% 100%, rgba(79,142,247,0.10) 0%, transparent 55%),
    radial-gradient(ellipse 40% 35% at 50% 50%, rgba(56,232,200,0.04) 0%, transparent 50%);
  pointer-events: none;
  z-index: 0;
}

body::after {
  content: '';
  position: fixed;
  inset: 0;
  background-image:
    linear-gradient(rgba(79,142,247,0.025) 1px, transparent 1px),
    linear-gradient(90deg, rgba(79,142,247,0.025) 1px, transparent 1px);
  background-size: 40px 40px;
  pointer-events: none;
  z-index: 0;
}

.page {
  position: relative;
  z-index: 1;
  display: flex;
  flex-direction: column;
  min-height: 100vh;
  padding: 20px 20px 60px;
  max-width: 1600px;
  margin: 0 auto;
}

/* HEADER */
.header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 20px;
  margin-bottom: 24px;
  flex-wrap: wrap;
}

.header-left h1 {
  font-size: clamp(1.4rem, 3vw, 2rem);
  font-weight: 700;
  letter-spacing: -0.03em;
  background: linear-gradient(135deg, #e8edf8 0%, var(--accent-cyan) 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  line-height: 1.1;
}

.header-left p {
  color: var(--text-secondary);
  font-size: 0.82rem;
  margin-top: 5px;
  font-weight: 300;
}

.clock-card {
  background: var(--glass-bg);
  border: 1px solid var(--glass-border);
  border-radius: var(--radius-md);
  padding: 12px 20px;
  text-align: right;
  backdrop-filter: blur(16px);
  box-shadow: var(--shadow-glass);
}

.clock-time {
  font-family: 'JetBrains Mono', monospace;
  font-size: clamp(1.4rem, 2.5vw, 2rem);
  font-weight: 500;
  color: var(--accent-cyan);
  letter-spacing: 0.04em;
  text-shadow: 0 0 20px rgba(56,232,200,0.3);
}

.clock-date {
  font-size: 0.75rem;
  color: var(--text-secondary);
  margin-top: 3px;
  letter-spacing: 0.06em;
  text-transform: uppercase;
}

/* COLUMNS: LEFT=Camioane, RIGHT=Resi */
.columns {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 20px;
  flex: 1;
  align-items: start;
}

.column {
  display: flex;
  flex-direction: column;
  gap: 16px;
}

.column-right {
  border-left: 1px solid rgba(248,113,113,0.10);
  padding-left: 20px;
}

.col-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 10px;
  padding-bottom: 14px;
  border-bottom: 1px solid rgba(255,255,255,0.06);
  margin-bottom: 4px;
  flex-wrap: wrap;
}

.col-title {
  display: flex;
  align-items: center;
  gap: 10px;
  font-size: 0.85rem;
  font-weight: 700;
  letter-spacing: 0.09em;
  text-transform: uppercase;
}

.col-dot { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; }
.dot-blue { background: var(--accent-blue); box-shadow: 0 0 10px var(--accent-blue); }
.dot-rose { background: var(--accent-rose); box-shadow: 0 0 10px var(--accent-rose); }

.col-count {
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.72rem;
  color: var(--text-muted);
  background: rgba(255,255,255,0.04);
  border: 1px solid var(--glass-border);
  border-radius: 20px;
  padding: 2px 9px;
}

/* ADD BUTTON */
.btn-add {
  display: flex;
  align-items: center;
  gap: 7px;
  padding: 8px 15px;
  border-radius: var(--radius-sm);
  border: 1px solid rgba(79,142,247,0.35);
  background: rgba(79,142,247,0.10);
  color: var(--accent-blue);
  font-family: 'Sora', sans-serif;
  font-size: 0.78rem;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.2s ease;
  letter-spacing: 0.03em;
  white-space: nowrap;
}
.btn-add:hover {
  background: rgba(79,142,247,0.20);
  border-color: rgba(79,142,247,0.65);
  box-shadow: 0 0 18px rgba(79,142,247,0.18);
  transform: translateY(-1px);
}
.btn-add-rose {
  border-color: rgba(248,113,113,0.35);
  background: rgba(248,113,113,0.09);
  color: var(--accent-rose);
}
.btn-add-rose:hover {
  background: rgba(248,113,113,0.18);
  border-color: rgba(248,113,113,0.65);
  box-shadow: 0 0 18px rgba(248,113,113,0.18);
}

/* CARD */
.card {
  background: var(--glass-bg);
  border: 1px solid var(--glass-border);
  border-radius: var(--radius-lg);
  backdrop-filter: blur(20px);
  box-shadow: var(--shadow-glass);
  overflow: hidden;
  transition: box-shadow 0.25s ease, border-color 0.25s ease;
  animation: cardIn 0.3s cubic-bezier(0.34,1.56,0.64,1) both;
}

@keyframes cardIn {
  from { opacity: 0; transform: translateY(12px) scale(0.98); }
  to   { opacity: 1; transform: translateY(0) scale(1); }
}

.card:hover { box-shadow: var(--shadow-hover); border-color: rgba(255,255,255,0.15); }

/* COMPACT STATE */
.card.is-compact { cursor: pointer; }
.card.is-compact:hover { border-color: rgba(79,142,247,0.4); }
.card.is-compact.resi-card:hover { border-color: rgba(248,113,113,0.4); }

.card-compact-view {
  display: none;
  padding: 11px 16px;
  gap: 9px;
  align-items: center;
  flex-wrap: wrap;
}

.card.is-compact .card-compact-view { display: flex; }
.card.is-compact .card-header,
.card.is-compact .card-body { display: none; }

.compact-badge {
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.63rem;
  padding: 2px 8px;
  border-radius: 20px;
  font-weight: 700;
  flex-shrink: 0;
}
.compact-badge-blue { background: rgba(79,142,247,0.15); color: var(--accent-blue); border: 1px solid rgba(79,142,247,0.3); }
.compact-badge-rose { background: rgba(248,113,113,0.12); color: var(--accent-rose); border: 1px solid rgba(248,113,113,0.25); }

.compact-time {
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.68rem;
  color: var(--accent-cyan);
  flex-shrink: 0;
}

.compact-firma {
  font-size: 0.83rem;
  font-weight: 600;
  color: var(--text-primary);
  flex: 1;
  min-width: 0;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

.compact-pills {
  display: flex;
  gap: 5px;
  flex-shrink: 0;
  flex-wrap: wrap;
}

.compact-pill {
  font-size: 0.66rem;
  padding: 2px 7px;
  border-radius: 20px;
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.08);
  color: var(--text-secondary);
  font-family: 'JetBrains Mono', monospace;
}

.compact-sig {
  font-size: 0.70rem;
  color: var(--text-muted);
  flex-shrink: 0;
}

.compact-expand-hint {
  font-size: 0.61rem;
  color: var(--text-muted);
  letter-spacing: 0.06em;
  text-transform: uppercase;
  margin-left: auto;
  flex-shrink: 0;
  opacity: 0.6;
}

/* EDITING STATE */
.card.is-editing {
  border-color: rgba(251,191,36,0.4) !important;
  box-shadow: 0 0 0 3px rgba(251,191,36,0.07), var(--shadow-hover);
}

/* CONFIRM BAR */
.confirm-bar {
  display: none;
  align-items: center;
  justify-content: flex-end;
  gap: 10px;
  padding: 10px 16px;
  border-top: 1px solid rgba(251,191,36,0.15);
  background: rgba(251,191,36,0.04);
}
.card.is-editing .confirm-bar { display: flex; }

.btn-confirm {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 7px 16px;
  border-radius: var(--radius-sm);
  border: 1px solid rgba(56,232,200,0.4);
  background: rgba(56,232,200,0.10);
  color: var(--accent-cyan);
  font-family: 'Sora', sans-serif;
  font-size: 0.78rem;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.2s ease;
}
.btn-confirm:hover {
  background: rgba(56,232,200,0.20);
  border-color: rgba(56,232,200,0.65);
  box-shadow: 0 0 14px rgba(56,232,200,0.18);
}

.btn-cancel-edit {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 7px 14px;
  border-radius: var(--radius-sm);
  border: 1px solid rgba(255,255,255,0.08);
  background: rgba(255,255,255,0.04);
  color: var(--text-secondary);
  font-family: 'Sora', sans-serif;
  font-size: 0.78rem;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.2s ease;
}
.btn-cancel-edit:hover { background: rgba(255,255,255,0.09); color: var(--text-primary); }

.editing-label {
  font-size: 0.72rem;
  color: var(--accent-amber);
  letter-spacing: 0.05em;
  font-weight: 600;
  flex: 1;
}

/* CARD HEADER & BODY */
.card-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 12px 16px 10px;
  border-bottom: 1px solid rgba(255,255,255,0.055);
  gap: 8px;
}

.card-number {
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.69rem;
  color: var(--text-muted);
  background: rgba(255,255,255,0.04);
  border: 1px solid var(--glass-border);
  border-radius: 20px;
  padding: 2px 9px;
  flex-shrink: 0;
}

.card-timestamp {
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.69rem;
  color: var(--accent-cyan);
  opacity: 0.65;
  flex: 1;
  text-align: right;
  margin-right: 6px;
}

.btn-icon {
  width: 28px; height: 28px;
  border-radius: 7px;
  border: 1px solid var(--glass-border);
  background: rgba(255,255,255,0.03);
  color: var(--text-secondary);
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  font-size: 0.8rem;
  transition: all 0.18s;
  flex-shrink: 0;
}
.btn-icon:hover { background: rgba(255,255,255,0.09); color: var(--text-primary); }
.btn-icon.delete:hover { background: rgba(248,113,113,0.14); color: var(--accent-rose); border-color: rgba(248,113,113,0.35); }

.card-body {
  padding: 14px 16px 16px;
  display: flex;
  flex-direction: column;
  gap: 12px;
}

.field { display: flex; flex-direction: column; gap: 5px; }

label {
  font-size: 0.69rem;
  font-weight: 600;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--text-muted);
}

input[type="text"], textarea, select {
  background: rgba(255,255,255,0.045);
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: var(--radius-sm);
  color: var(--text-primary);
  font-family: 'Sora', sans-serif;
  font-size: 0.84rem;
  padding: 9px 12px;
  outline: none;
  transition: border-color 0.2s, background 0.2s, box-shadow 0.2s;
  width: 100%;
}
textarea { resize: vertical; min-height: 58px; }
input:focus, textarea:focus, select:focus {
  border-color: rgba(79,142,247,0.5);
  background: rgba(79,142,247,0.055);
  box-shadow: 0 0 0 3px rgba(79,142,247,0.10);
}

@keyframes fieldPulse {
  0%   { border-color: rgba(255,255,255,0.08); box-shadow: none; }
  50%  { border-color: rgba(251,191,36,0.55); box-shadow: 0 0 0 3px rgba(251,191,36,0.10); }
  100% { border-color: rgba(255,255,255,0.08); box-shadow: none; }
}
input.field-required-pulse {
  animation: fieldPulse 2.4s ease-in-out infinite;
  border-color: rgba(251,191,36,0.35);
}
input.field-required-pulse:focus {
  animation: none;
  border-color: rgba(79,142,247,0.5);
  background: rgba(79,142,247,0.055);
  box-shadow: 0 0 0 3px rgba(79,142,247,0.10);
}

/* RADIO PILLS */
.radio-group { display: flex; flex-wrap: wrap; gap: 6px; }
.radio-pill {
  display: flex; align-items: center; gap: 6px;
  cursor: pointer; user-select: none;
  font-size: 0.78rem; font-weight: 600;
  padding: 6px 13px; border-radius: 50px;
  border: 1.5px solid var(--glass-border);
  background: rgba(255,255,255,0.03);
  color: var(--text-secondary);
  transition: all 0.2s ease; white-space: nowrap;
}
.radio-pill input[type="radio"] { display: none; }
.radio-pill:hover { background: rgba(255,255,255,0.07); color: var(--text-primary); }
.radio-dot {
  width: 7px; height: 7px; border-radius: 50%;
  border: 1.5px solid currentColor; flex-shrink: 0;
  transition: all 0.18s; opacity: 0.5;
}
.radio-pill.opt-yes:has(input:checked) { border-color: rgba(79,142,247,0.55); background: rgba(79,142,247,0.10); color: var(--accent-blue); }
.radio-pill.opt-yes input:checked ~ .radio-dot { background: var(--accent-blue); border-color: var(--accent-blue); opacity: 1; }
.radio-pill.opt-no:has(input:checked) { border-color: rgba(248,113,113,0.55); background: rgba(248,113,113,0.10); color: var(--accent-rose); }
.radio-pill.opt-no input:checked ~ .radio-dot { background: var(--accent-rose); border-color: var(--accent-rose); opacity: 1; }
.radio-pill.opt-unknown:has(input:checked) { border-color: rgba(251,191,36,0.45); background: rgba(251,191,36,0.08); color: var(--accent-amber); }
.radio-pill.opt-unknown input:checked ~ .radio-dot { background: var(--accent-amber); border-color: var(--accent-amber); opacity: 1; }
.radio-pill.opt-auth:has(input:checked) { border-color: rgba(167,139,250,0.55); background: rgba(167,139,250,0.10); color: var(--accent-violet); }
.radio-pill.opt-auth input:checked ~ .radio-dot { background: var(--accent-violet); border-color: var(--accent-violet); opacity: 1; }
.radio-pill.opt-noauth:has(input:checked) { border-color: rgba(248,113,113,0.55); background: rgba(248,113,113,0.10); color: var(--accent-rose); }
.radio-pill.opt-noauth input:checked ~ .radio-dot { background: var(--accent-rose); border-color: var(--accent-rose); opacity: 1; }

/* NUMBER INPUTS */
input[type="number"] {
  background: rgba(255,255,255,0.045);
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: var(--radius-sm);
  color: var(--text-primary);
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.9rem;
  padding: 9px 12px;
  outline: none;
  transition: border-color 0.2s, background 0.2s, box-shadow 0.2s;
  width: 100%;
  -moz-appearance: textfield;
}
input[type="number"]::-webkit-outer-spin-button,
input[type="number"]::-webkit-inner-spin-button { -webkit-appearance: none; }
input[type="number"]:focus { border-color: rgba(56,232,200,0.45); background: rgba(56,232,200,0.04); box-shadow: 0 0 0 3px rgba(56,232,200,0.08); }

.qty-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 2px; }
.qty-block { display: flex; flex-direction: column; gap: 5px; }
.qty-block label { font-size: 0.67rem; color: var(--text-muted); letter-spacing: 0.07em; text-transform: uppercase; font-weight: 600; }
.qty-block.hidden { display: none; }

/* CHECKBOXES */
.check-group { display: flex; flex-wrap: wrap; gap: 6px; }
.check-label {
  display: flex; align-items: center; gap: 7px;
  cursor: pointer; user-select: none;
  font-size: 0.78rem; color: var(--text-secondary);
  padding: 6px 13px; border-radius: var(--radius-sm);
  border: 1px solid var(--glass-border);
  background: rgba(255,255,255,0.03);
  transition: all 0.18s; font-weight: 500;
}
.check-label:hover { background: rgba(255,255,255,0.07); color: var(--text-primary); }
.check-label input[type="checkbox"] { display: none; }
.check-box {
  width: 16px; height: 16px; border-radius: 4px;
  border: 1.5px solid var(--text-muted);
  display: flex; align-items: center; justify-content: center;
  transition: all 0.18s; flex-shrink: 0; font-size: 0.65rem;
}
.check-label.bancal input:checked ~ .check-box { background: var(--accent-cyan); border-color: var(--accent-cyan); box-shadow: 0 0 8px rgba(56,232,200,0.4); }

/* SIGNATURE */
.signature-wrap { position: relative; }
.signature-icon { position: absolute; right: 11px; top: 50%; transform: translateY(-50%); font-size: 0.9rem; opacity: 0.28; pointer-events: none; }
.signature-wrap input { padding-right: 32px; }

/* EMPTY STATE */
.empty-state {
  text-align: center; padding: 28px 16px;
  color: var(--text-muted); font-size: 0.8rem;
  border: 1px dashed rgba(255,255,255,0.06);
  border-radius: var(--radius-lg);
  letter-spacing: 0.04em; line-height: 1.6;
}
.empty-state .emoji { font-size: 1.6rem; display: block; margin-bottom: 8px; }

/* TOAST */
.toast {
  position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
  background: rgba(30,40,65,0.95);
  border: 1px solid var(--glass-border);
  border-radius: var(--radius-md);
  padding: 10px 18px; font-size: 0.8rem; color: var(--text-primary);
  box-shadow: 0 12px 40px rgba(0,0,0,0.5);
  backdrop-filter: blur(20px); z-index: 999;
  animation: toastIn 0.28s ease; max-width: 280px; text-align: center;
}
@keyframes toastIn { from { opacity: 0; transform: translateX(-50%) translateY(14px); } to { opacity: 1; transform: translateX(-50%) translateY(0); } }
.toast.fade-out { animation: toastOut 0.28s ease forwards; }
@keyframes toastOut { to { opacity: 0; transform: translateX(-50%) translateY(8px); } }

/* FAB – bottom RIGHT */
.fab-cal {
  position: fixed; bottom: 28px; right: 28px;
  width: 52px; height: 52px; border-radius: 50%;
  background: rgba(79,142,247,0.18);
  border: 1.5px solid rgba(79,142,247,0.45);
  color: var(--accent-blue); cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  box-shadow: 0 8px 28px rgba(79,142,247,0.2);
  transition: all 0.22s ease; z-index: 100;
  backdrop-filter: blur(12px);
}
.fab-cal:hover {
  background: rgba(79,142,247,0.28); border-color: rgba(79,142,247,0.7);
  box-shadow: 0 12px 36px rgba(79,142,247,0.3);
  transform: translateY(-2px) scale(1.05);
}

/* MODAL – slides from RIGHT */
.modal-overlay {
  position: fixed; inset: 0;
  background: rgba(5,8,20,0.75);
  backdrop-filter: blur(8px);
  z-index: 500; display: none;
  align-items: center; justify-content: flex-end;
  padding: 20px; animation: fadeIn 0.2s ease;
}
.modal-overlay.open { display: flex; }
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

.modal {
  background: #0e1628;
  border: 1px solid rgba(255,255,255,0.12);
  border-radius: 22px; width: 100%; max-width: 480px;
  max-height: 92vh; overflow: hidden;
  display: flex; flex-direction: column;
  box-shadow: 0 32px 80px rgba(0,0,0,0.6);
  animation: modalIn 0.28s cubic-bezier(0.34,1.4,0.64,1);
}
@keyframes modalIn { from { opacity: 0; transform: scale(0.95) translateX(20px); } to { opacity: 1; transform: scale(1) translateX(0); } }

.modal-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 18px 22px 16px;
  border-bottom: 1px solid rgba(255,255,255,0.07); flex-shrink: 0;
}
.modal-title {
  display: flex; align-items: center; gap: 10px;
  font-size: 0.92rem; font-weight: 700;
  letter-spacing: 0.05em; text-transform: uppercase; color: var(--accent-blue);
}
.modal-close {
  width: 30px; height: 30px; border-radius: 8px;
  border: 1px solid var(--glass-border); background: rgba(255,255,255,0.04);
  color: var(--text-secondary); cursor: pointer;
  display: flex; align-items: center; justify-content: center; transition: all 0.18s;
}
.modal-close:hover { background: rgba(248,113,113,0.14); color: var(--accent-rose); border-color: rgba(248,113,113,0.35); }

.modal-body {
  overflow-y: auto; padding: 20px 22px 24px; flex: 1;
  scrollbar-width: thin; scrollbar-color: rgba(255,255,255,0.1) transparent;
}

/* STATS */
.stats-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 12px; margin-bottom: 24px; }
.stat-card {
  background: var(--glass-bg); border: 1px solid var(--glass-border);
  border-radius: var(--radius-md); padding: 14px 16px; text-align: center;
}
.stat-val { font-family: 'JetBrains Mono', monospace; font-size: 1.8rem; font-weight: 500; line-height: 1; margin-bottom: 5px; }
.stat-label { font-size: 0.69rem; color: var(--text-muted); letter-spacing: 0.07em; text-transform: uppercase; font-weight: 600; }

/* CHART */
.chart-section { margin-bottom: 24px; }
.chart-title { font-size: 0.72rem; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; color: var(--text-muted); margin-bottom: 12px; }
.week-bars { display: flex; align-items: flex-end; gap: 8px; height: 90px; }
.week-bar-wrap { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 4px; height: 100%; justify-content: flex-end; }
.week-bar { width: 100%; border-radius: 6px 6px 0 0; background: rgba(79,142,247,0.25); border: 1px solid rgba(79,142,247,0.4); transition: height 0.4s cubic-bezier(0.34,1.2,0.64,1); min-height: 3px; }
.week-bar.today-bar { background: rgba(56,232,200,0.25); border-color: rgba(56,232,200,0.5); box-shadow: 0 0 12px rgba(56,232,200,0.15); }
.week-bar-count { font-family: 'JetBrains Mono', monospace; font-size: 0.68rem; color: var(--text-secondary); }
.week-bar-day { font-size: 0.65rem; color: var(--text-muted); letter-spacing: 0.05em; text-transform: uppercase; font-weight: 600; }

/* DAY LIST */
.day-section { margin-bottom: 10px; }
.day-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 10px 14px;
  border-radius: var(--radius-md) var(--radius-md) 0 0;
  background: rgba(255,255,255,0.04); border: 1px solid var(--glass-border);
  cursor: pointer; user-select: none; transition: background 0.18s;
}
.day-header:hover { background: rgba(255,255,255,0.07); }
.day-header-left { display: flex; align-items: center; gap: 10px; }
.day-date-label { font-weight: 700; font-size: 0.85rem; }
.day-badges { display: flex; gap: 6px; }
.day-badge { font-family: 'JetBrains Mono', monospace; font-size: 0.65rem; padding: 2px 8px; border-radius: 20px; font-weight: 600; }
.badge-truck { background: rgba(79,142,247,0.15); color: var(--accent-blue); border: 1px solid rgba(79,142,247,0.25); }
.badge-resi  { background: rgba(248,113,113,0.12); color: var(--accent-rose); border: 1px solid rgba(248,113,113,0.22); }
.badge-hot   { background: rgba(251,191,36,0.12); color: var(--accent-amber); border: 1px solid rgba(251,191,36,0.25); }
.day-chevron { font-size: 0.7rem; color: var(--text-muted); transition: transform 0.2s; }
.day-header.open .day-chevron { transform: rotate(180deg); }
.day-entries { border: 1px solid var(--glass-border); border-top: none; border-radius: 0 0 var(--radius-md) var(--radius-md); overflow: hidden; display: none; }
.day-entries.open { display: block; }
.entry-row { display: flex; align-items: center; gap: 10px; padding: 9px 14px; border-bottom: 1px solid rgba(255,255,255,0.04); font-size: 0.8rem; }
.entry-row:last-child { border-bottom: none; }
.entry-type { font-family: 'JetBrains Mono', monospace; font-size: 0.65rem; padding: 2px 7px; border-radius: 4px; flex-shrink: 0; font-weight: 600; }
.entry-time { font-family: 'JetBrains Mono', monospace; font-size: 0.75rem; color: var(--accent-cyan); flex-shrink: 0; min-width: 42px; }
.entry-firma { color: var(--text-primary); flex: 1; }
.entry-sig { color: var(--text-muted); font-size: 0.72rem; }
.entry-qty { color: var(--text-secondary); font-size: 0.72rem; font-family: 'JetBrains Mono', monospace; }
.no-history { text-align: center; padding: 32px 16px; color: var(--text-muted); font-size: 0.82rem; letter-spacing: 0.04em; }

/* RESPONSIVE */
@media (max-width: 820px) {
  .columns { grid-template-columns: 1fr; gap: 32px; }
  .column-right { border-left: none; padding-left: 0; }
  .modal { max-width: 100%; }
}
@media (max-width: 500px) {
  .page { padding: 14px 12px 50px; }
  .header { flex-direction: column; }
  .clock-card { text-align: left; width: 100%; }
}
@media print {
  body::before, body::after { display: none; }
  .btn-add, .btn-icon { display: none !important; }
  .card { border: 1px solid #ccc; background: white; color: black; }
}
</style>
</head>
<body>

<div class="page">
  <div class="header">
    <div class="header-left">
      <h1>📦 Registru Depozit</h1>
      <p>Evidența intrărilor zilnice &amp; returnărilor</p>
    </div>
    <div class="clock-card">
      <div class="clock-time" id="clock">--:--:--</div>
      <div class="clock-date" id="clock-date">--</div>
    </div>
  </div>

  <div class="columns">
    <!-- LEFT: CAMIOANE -->
    <div class="column column-left">
      <div class="col-header">
        <div class="col-title">
          <span class="col-dot dot-blue"></span>
          Intrări camioane
          <span class="col-count" id="count-trucks">0 înregistrări</span>
        </div>
        <button class="btn-add" onclick="addTruck()">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          Adaugă camion
        </button>
      </div>
      <div id="trucks-list"></div>
    </div>

    <!-- RIGHT: RESI -->
    <div class="column column-right">
      <div class="col-header">
        <div class="col-title">
          <span class="col-dot dot-rose"></span>
          Returnări (Resi)
          <span class="col-count" id="count-resi">0 înregistrări</span>
        </div>
        <button class="btn-add btn-add-rose" onclick="addResi()">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          Adaugă returnare
        </button>
      </div>
      <div id="resi-list"></div>
    </div>
  </div>
</div>

<!-- FAB – bottom right -->
<button class="fab-cal" onclick="openCalendar()" title="Istoric & statistici">
  <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
</button>

<!-- Modal – right side panel -->
<div class="modal-overlay" id="calModal" onclick="if(event.target===this)closeCalendar()">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
        Istoric &amp; Statistici
      </div>
      <button class="modal-close" onclick="closeCalendar()">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
    <div class="modal-body" id="calBody"></div>
  </div>
</div>

<script>
let trucks = [];
let resis = [];
let truckCount = 0;
let resiCount = 0;

// CLOCK
function updateClock() {
  const now = new Date();
  const zi = ['Duminică','Luni','Marți','Miercuri','Joi','Vineri','Sâmbătă'][now.getDay()];
  const luna = ['ianuarie','februarie','martie','aprilie','mai','iunie','iulie','august','septembrie','octombrie','noiembrie','decembrie'][now.getMonth()];
  document.getElementById('clock').textContent = now.toLocaleTimeString('ro-RO', { hour12: false });
  document.getElementById('clock-date').textContent = `${zi}, ${now.getDate()} ${luna} ${now.getFullYear()}`;
}
setInterval(updateClock, 1000);
updateClock();

function nowStamp() {
  const d = new Date();
  return d.toLocaleString('ro-RO', { day:'2-digit', month:'2-digit', year:'numeric', hour:'2-digit', minute:'2-digit', hour12: false });
}

function toast(msg) {
  const t = document.createElement('div');
  t.className = 'toast';
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(() => { t.classList.add('fade-out'); setTimeout(() => t.remove(), 280); }, 2400);
}

function updateCounts() {
  const tc = trucks.length, rc = resis.length;
  document.getElementById('count-trucks').textContent = tc === 0 ? 'nicio înregistrare' : tc === 1 ? '1 înregistrare' : `${tc} înregistrări`;
  document.getElementById('count-resi').textContent   = rc === 0 ? 'nicio înregistrare' : rc === 1 ? '1 înregistrare' : `${rc} înregistrări`;
}

// COMPACT / EXPAND LOGIC
function isTruckComplete(t) {
  return !!(t.firma && t.firma.trim() && t.semnatura && t.semnatura.trim());
}
function isResiComplete(r) {
  return !!(r.descriere && r.descriere.trim() && r.semnatura && r.semnatura.trim());
}

function maybeCollapseCard(id, type) {
  if (type === 'truck') {
    const t = trucks.find(x => x.id === id);
    if (t && isTruckComplete(t) && !t.collapsed) {
      t.collapsed = true; t.editing = false;
      renderTrucks(); saveHistory();
      toast('✅ Card restrâns – apasă pe el pentru a edita');
    }
  } else {
    const r = resis.find(x => x.id === id);
    if (r && isResiComplete(r) && !r.collapsed) {
      r.collapsed = true; r.editing = false;
      renderResis(); saveHistory();
      toast('✅ Card restrâns – apasă pe el pentru a edita');
    }
  }
}

function expandCard(id, type) {
  if (type === 'truck') {
    const t = trucks.find(x => x.id === id);
    if (t) { t.collapsed = false; t.editing = true; renderTrucks(); }
  } else {
    const r = resis.find(x => x.id === id);
    if (r) { r.collapsed = false; r.editing = true; renderResis(); }
  }
}

function confirmEdit(id, type) {
  if (type === 'truck') {
    const t = trucks.find(x => x.id === id);
    if (t) {
      t.editing = false;
      if (isTruckComplete(t)) t.collapsed = true;
      renderTrucks(); saveHistory(); toast('💾 Modificări salvate');
    }
  } else {
    const r = resis.find(x => x.id === id);
    if (r) {
      r.editing = false;
      if (isResiComplete(r)) r.collapsed = true;
      renderResis(); saveHistory(); toast('💾 Modificări salvate');
    }
  }
}

function cancelEdit(id, type) {
  if (type === 'truck') {
    const t = trucks.find(x => x.id === id);
    if (t) { t.editing = false; t.collapsed = isTruckComplete(t); renderTrucks(); }
  } else {
    const r = resis.find(x => x.id === id);
    if (r) { r.editing = false; r.collapsed = isResiComplete(r); renderResis(); }
  }
}

// TRUCKS
function addTruck(data) {
  truckCount++;
  const id = 'truck-' + Date.now() + '-' + truckCount;
  const ts = nowStamp();
  const entry = data || { id, ts, firma:'', programat:'', bancal:false, nrBancale:'', cutii:false, nrCutii:'', comentariu:'', semnatura:'', arrivalTime:'', collapsed:false, editing:false };
  if (!data) entry.id = id;
  trucks.push(entry);
  renderTrucks(); updateCounts(); saveHistory();
  if (!data) toast('🚛 Înregistrare nouă adăugată');
}

function removeTruck(id) {
  if (!confirm('Ștergi această înregistrare?')) return;
  trucks = trucks.filter(t => t.id !== id);
  renderTrucks(); updateCounts(); saveHistory(); toast('🗑️ Șters');
}

function renderTrucks() {
  const list = document.getElementById('trucks-list');
  list.innerHTML = '';
  if (trucks.length === 0) {
    list.innerHTML = `<div class="empty-state"><span class="emoji">🚛</span>Niciun camion înregistrat astăzi.<br>Apasă „Adaugă camion" pentru a începe.</div>`;
    return;
  }
  trucks.forEach((t, i) => {
    const card = document.createElement('div');
    card.className = 'card' + (t.collapsed ? ' is-compact' : '') + (t.editing ? ' is-editing' : '');
    card.id = t.id;

    const qty = [
      t.bancal && t.nrBancale ? `${t.nrBancale} bancale` : t.bancal ? 'bancale' : '',
      t.cutii && t.nrCutii ? `${t.nrCutii} cutii` : t.cutii ? 'cutii' : ''
    ].filter(Boolean).join(', ');

    const progLabel = t.programat === 'programat' ? '✓ Prog.' : t.programat === 'neprogramat' ? '✗ Neprog.' : '';

    card.innerHTML = `
      <div class="card-compact-view" onclick="expandCard('${t.id}','truck')">
        <span class="compact-badge compact-badge-blue">CAM #${String(i+1).padStart(2,'0')}</span>
        <span class="compact-time">${t.arrivalTime || (t.ts ? t.ts.split(' ')[1] : '–') || '–'}</span>
        <span class="compact-firma">${t.firma || 'Firmă necunoscută'}</span>
        <div class="compact-pills">
          ${qty ? `<span class="compact-pill">${qty}</span>` : ''}
          ${progLabel ? `<span class="compact-pill">${progLabel}</span>` : ''}
        </div>
        ${t.semnatura ? `<span class="compact-sig">✍ ${t.semnatura}</span>` : ''}
        <span class="compact-expand-hint">✎ editează</span>
      </div>
      <div class="card-header">
        <span class="card-number">CAM #${String(i+1).padStart(2,'0')}</span>
        <span class="card-timestamp">${t.ts}</span>
        <button class="btn-icon delete" title="Șterge" onclick="removeTruck('${t.id}')">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6M14 11v6"/><path d="M9 6V4h6v2"/></svg>
        </button>
      </div>
      <div class="card-body">
        <div class="field">
          <label>Firma / Furnizor</label>
          <input type="text" placeholder="ex: KOH-I-NOOR, Bic…" value="${t.firma}"
            class="${!t.firma ? 'field-required-pulse' : ''}"
            oninput="this.classList.toggle('field-required-pulse',!this.value.trim())"
            onchange="updateTruck('${t.id}','firma',this.value)">
        </div>
        <div class="field">
          <label>Status livrare</label>
          <div class="radio-group">
            <label class="radio-pill opt-yes"><input type="radio" name="prog-${t.id}" value="programat" ${t.programat==='programat'?'checked':''} onchange="updateTruck('${t.id}','programat',this.value)"><span class="radio-dot"></span><span>Programat</span></label>
            <label class="radio-pill opt-no"><input type="radio" name="prog-${t.id}" value="neprogramat" ${t.programat==='neprogramat'?'checked':''} onchange="updateTruck('${t.id}','programat',this.value)"><span class="radio-dot"></span><span>Neprogramat</span></label>
            <label class="radio-pill opt-unknown"><input type="radio" name="prog-${t.id}" value="necunoscut" ${t.programat==='necunoscut'?'checked':''} onchange="updateTruck('${t.id}','programat',this.value)"><span class="radio-dot"></span><span>Necunoscut</span></label>
          </div>
        </div>
        <div class="field">
          <label>Tip marfă</label>
          <div class="check-group">
            <label class="check-label bancal"><input type="checkbox" ${t.bancal?'checked':''} onchange="updateTruck('${t.id}','bancal',this.checked)"><span class="check-box">${t.bancal?'✓':''}</span><span>Bancal</span></label>
            <label class="check-label bancal"><input type="checkbox" ${t.cutii?'checked':''} onchange="updateTruck('${t.id}','cutii',this.checked)"><span class="check-box">${t.cutii?'✓':''}</span><span>Cutii</span></label>
          </div>
          <div class="qty-row">
            <div class="qty-block ${t.bancal?'':'hidden'}" id="qty-bancal-${t.id}">
              <label>Nr. bancale</label>
              <input type="number" min="0" placeholder="0" value="${t.nrBancale}" onchange="updateTruck('${t.id}','nrBancale',this.value)">
            </div>
            <div class="qty-block ${t.cutii?'':'hidden'}" id="qty-cutii-${t.id}">
              <label>Nr. cutii</label>
              <input type="number" min="0" placeholder="0" value="${t.nrCutii}" onchange="updateTruck('${t.id}','nrCutii',this.value)">
            </div>
          </div>
        </div>
        <div class="field">
          <label>Comentariu</label>
          <textarea placeholder="Observații, daune, lipsuri…" onchange="updateTruck('${t.id}','comentariu',this.value)">${t.comentariu}</textarea>
        </div>
        <div class="field">
          <label>Semnătura responsabil</label>
          <div class="signature-wrap">
            <input type="text" placeholder="Numele celui care a ridicat" value="${t.semnatura}"
              class="${!t.semnatura?'field-required-pulse':''}"
              oninput="this.classList.toggle('field-required-pulse',!this.value.trim())"
              onchange="updateTruck('${t.id}','semnatura',this.value)">
            <span class="signature-icon">✍️</span>
          </div>
          ${t.arrivalTime?`<div style="font-family:'JetBrains Mono',monospace;font-size:0.68rem;color:var(--accent-cyan);opacity:0.7;margin-top:4px;">⏱ Sosit: ${t.arrivalTime}</div>`:''}
        </div>
      </div>
      <div class="confirm-bar">
        <span class="editing-label">✎ Mod editare</span>
        <button class="btn-cancel-edit" onclick="cancelEdit('${t.id}','truck')">Anulează</button>
        <button class="btn-confirm" onclick="confirmEdit('${t.id}','truck')">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg>
          Confirmă
        </button>
      </div>
    `;
    list.appendChild(card);
  });
}

function updateTruck(id, field, val) {
  const t = trucks.find(x => x.id === id);
  if (!t) return;
  t[field] = val;
  if (field === 'semnatura' && val.trim() && !t.arrivalTime) {
    t.arrivalTime = new Date().toLocaleTimeString('ro-RO', { hour:'2-digit', minute:'2-digit', hour12:false });
  }
  if (field === 'bancal') {
    const el = document.getElementById('qty-bancal-' + id);
    if (el) el.classList.toggle('hidden', !val);
    if (!val) { t.nrBancale = ''; const inp = el && el.querySelector('input'); if(inp) inp.value = ''; }
  } else if (field === 'cutii') {
    const el = document.getElementById('qty-cutii-' + id);
    if (el) el.classList.toggle('hidden', !val);
    if (!val) { t.nrCutii = ''; const inp = el && el.querySelector('input'); if(inp) inp.value = ''; }
  }
  if (field === 'semnatura' && val.trim() && isTruckComplete(t)) {
    setTimeout(() => maybeCollapseCard(id, 'truck'), 900);
  }
  saveHistory();
}

// RESI
function addResi(data) {
  resiCount++;
  const id = 'resi-' + Date.now() + '-' + resiCount;
  const ts = nowStamp();
  const entry = data || { id, ts, descriere:'', autorizat:'', bancal:false, nrBancale:'', cutii:false, nrCutii:'', comentariu:'', semnatura:'', collapsed:false, editing:false };
  if (!data) entry.id = id;
  resis.push(entry);
  renderResis(); updateCounts(); saveHistory();
  if (!data) toast('📦 Returnare adăugată');
}

function removeResi(id) {
  if (!confirm('Ștergi această returnare?')) return;
  resis = resis.filter(r => r.id !== id);
  renderResis(); updateCounts(); saveHistory(); toast('🗑️ Șters');
}

function renderResis() {
  const list = document.getElementById('resi-list');
  list.innerHTML = '';
  if (resis.length === 0) {
    list.innerHTML = `<div class="empty-state"><span class="emoji">↩️</span>Nicio returnare înregistrată.<br>Apasă „Adaugă returnare" pentru a începe.</div>`;
    return;
  }
  resis.forEach((r, i) => {
    const card = document.createElement('div');
    card.className = 'card resi-card' + (r.collapsed ? ' is-compact' : '') + (r.editing ? ' is-editing' : '');
    card.id = r.id;
    if (!r.collapsed) card.style.borderColor = 'rgba(248,113,113,0.11)';

    const qty = [
      r.bancal && r.nrBancale ? `${r.nrBancale} bancale` : r.bancal ? 'bancale' : '',
      r.cutii && r.nrCutii ? `${r.nrCutii} cutii` : r.cutii ? 'cutii' : ''
    ].filter(Boolean).join(', ');
    const authLabel = r.autorizat === 'autorizat' ? '✓ Autor.' : r.autorizat === 'neautorizat' ? '✗ Neautor.' : '';

    card.innerHTML = `
      <div class="card-compact-view" onclick="expandCard('${r.id}','resi')">
        <span class="compact-badge compact-badge-rose">RESI #${String(i+1).padStart(2,'0')}</span>
        <span class="compact-time" style="color:var(--accent-rose)">${r.ts ? r.ts.split(' ')[1] : '–'}</span>
        <span class="compact-firma">${r.descriere || 'Fără descriere'}</span>
        <div class="compact-pills">
          ${qty ? `<span class="compact-pill">${qty}</span>` : ''}
          ${authLabel ? `<span class="compact-pill">${authLabel}</span>` : ''}
        </div>
        ${r.semnatura ? `<span class="compact-sig">✍ ${r.semnatura}</span>` : ''}
        <span class="compact-expand-hint">✎ editează</span>
      </div>
      <div class="card-header">
        <span class="card-number" style="color:var(--accent-rose);border-color:rgba(248,113,113,0.2);background:rgba(248,113,113,0.06)">RESI #${String(i+1).padStart(2,'0')}</span>
        <span class="card-timestamp">${r.ts}</span>
        <button class="btn-icon delete" title="Șterge" onclick="removeResi('${r.id}')">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6M14 11v6"/><path d="M9 6V4h6v2"/></svg>
        </button>
      </div>
      <div class="card-body">
        <div class="field">
          <label>Descriere pachete returnate</label>
          <input type="text" placeholder="ex: 3 colete Bic, referință…" value="${r.descriere}"
            class="${!r.descriere?'field-required-pulse':''}"
            oninput="this.classList.toggle('field-required-pulse',!this.value.trim())"
            onchange="updateResi('${r.id}','descriere',this.value)">
        </div>
        <div class="field">
          <label>Tip marfă</label>
          <div class="check-group">
            <label class="check-label bancal"><input type="checkbox" ${r.bancal?'checked':''} onchange="updateResi('${r.id}','bancal',this.checked)"><span class="check-box">${r.bancal?'✓':''}</span><span>Bancal</span></label>
            <label class="check-label bancal"><input type="checkbox" ${r.cutii?'checked':''} onchange="updateResi('${r.id}','cutii',this.checked)"><span class="check-box">${r.cutii?'✓':''}</span><span>Cutii</span></label>
          </div>
          <div class="qty-row">
            <div class="qty-block ${r.bancal?'':'hidden'}" id="qty-bancal-${r.id}">
              <label>Nr. bancale</label>
              <input type="number" min="0" placeholder="0" value="${r.nrBancale}" onchange="updateResi('${r.id}','nrBancale',this.value)">
            </div>
            <div class="qty-block ${r.cutii?'':'hidden'}" id="qty-cutii-${r.id}">
              <label>Nr. cutii</label>
              <input type="number" min="0" placeholder="0" value="${r.nrCutii}" onchange="updateResi('${r.id}','nrCutii',this.value)">
            </div>
          </div>
        </div>
        <div class="field">
          <label>Autorizare returnare</label>
          <div class="radio-group">
            <label class="radio-pill opt-auth"><input type="radio" name="auth-${r.id}" value="autorizat" ${r.autorizat==='autorizat'?'checked':''} onchange="updateResi('${r.id}','autorizat',this.value)"><span class="radio-dot"></span><span>Autorizată</span></label>
            <label class="radio-pill opt-noauth"><input type="radio" name="auth-${r.id}" value="neautorizat" ${r.autorizat==='neautorizat'?'checked':''} onchange="updateResi('${r.id}','autorizat',this.value)"><span class="radio-dot"></span><span>Neautorizată</span></label>
            <label class="radio-pill opt-unknown"><input type="radio" name="auth-${r.id}" value="necunoscut" ${r.autorizat==='necunoscut'?'checked':''} onchange="updateResi('${r.id}','autorizat',this.value)"><span class="radio-dot"></span><span>Necunoscut</span></label>
          </div>
        </div>
        <div class="field">
          <label>Comentariu</label>
          <textarea placeholder="Motivul returnării, stare pachet…" onchange="updateResi('${r.id}','comentariu',this.value)">${r.comentariu}</textarea>
        </div>
        <div class="field">
          <label>Semnătura responsabil</label>
          <div class="signature-wrap">
            <input type="text" placeholder="Numele celui care a ridicat" value="${r.semnatura}"
              class="${!r.semnatura?'field-required-pulse':''}"
              oninput="this.classList.toggle('field-required-pulse',!this.value.trim())"
              onchange="updateResi('${r.id}','semnatura',this.value)">
            <span class="signature-icon">✍️</span>
          </div>
        </div>
      </div>
      <div class="confirm-bar">
        <span class="editing-label">✎ Mod editare</span>
        <button class="btn-cancel-edit" onclick="cancelEdit('${r.id}','resi')">Anulează</button>
        <button class="btn-confirm" onclick="confirmEdit('${r.id}','resi')">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg>
          Confirmă
        </button>
      </div>
    `;
    list.appendChild(card);
  });
}

function updateResi(id, field, val) {
  const r = resis.find(x => x.id === id);
  if (!r) return;
  r[field] = val;
  if (field === 'bancal') {
    const el = document.getElementById('qty-bancal-' + id);
    if (el) el.classList.toggle('hidden', !val);
    if (!val) { r.nrBancale = ''; const inp = el && el.querySelector('input'); if(inp) inp.value = ''; }
  } else if (field === 'cutii') {
    const el = document.getElementById('qty-cutii-' + id);
    if (el) el.classList.toggle('hidden', !val);
    if (!val) { r.nrCutii = ''; const inp = el && el.querySelector('input'); if(inp) inp.value = ''; }
  }
  if (field === 'semnatura' && val.trim() && isResiComplete(r)) {
    setTimeout(() => maybeCollapseCard(id, 'resi'), 900);
  }
  saveHistory();
}

updateCounts();

// HISTORY
const HIST_KEY = 'registru_history';

function todayKey() {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

function saveHistory() {
  try {
    const raw = localStorage.getItem(HIST_KEY);
    const hist = raw ? JSON.parse(raw) : {};
    hist[todayKey()] = { trucks: trucks.map(t=>({...t})), resis: resis.map(r=>({...r})) };
    localStorage.setItem(HIST_KEY, JSON.stringify(hist));
  } catch(e) {}
}

function loadHistory() {
  try {
    const raw = localStorage.getItem(HIST_KEY);
    return raw ? JSON.parse(raw) : {};
  } catch(e) { return {}; }
}

// CALENDAR MODAL
function openCalendar() {
  saveHistory();
  document.getElementById('calBody').innerHTML = buildCalendarHTML(loadHistory());
  document.getElementById('calModal').classList.add('open');
}
function closeCalendar() {
  document.getElementById('calModal').classList.remove('open');
}
function toggleDay(idx) {
  document.getElementById('dh-'+idx).classList.toggle('open');
  document.getElementById('de-'+idx).classList.toggle('open');
}

let busiestKey = '', busiestCount = 0;

function buildCalendarHTML(hist) {
  const keys = Object.keys(hist).sort((a,b) => b.localeCompare(a));
  if (keys.length === 0) return `<div class="no-history">📭 Niciun istoric salvat încă.<br>Adaugă înregistrări și vor apărea aici.</div>`;

  let totalTrucks = 0, totalResis = 0;
  busiestKey = ''; busiestCount = 0;
  keys.forEach(k => {
    const tc = (hist[k].trucks||[]).length;
    totalTrucks += tc; totalResis += (hist[k].resis||[]).length;
    if (tc > busiestCount) { busiestCount = tc; busiestKey = k; }
  });
  const avg = keys.length ? (totalTrucks/keys.length).toFixed(1) : 0;

  const statsHTML = `<div class="stats-grid">
    <div class="stat-card"><div class="stat-val" style="color:var(--accent-blue)">${totalTrucks}</div><div class="stat-label">Intrări camioane</div></div>
    <div class="stat-card"><div class="stat-val" style="color:var(--accent-rose)">${totalResis}</div><div class="stat-label">Returnări Resi</div></div>
    <div class="stat-card"><div class="stat-val" style="color:var(--accent-amber)">${avg}</div><div class="stat-label">Medie / zi</div></div>
  </div>`;

  const dayNames = ['Du','Lu','Ma','Mi','Jo','Vi','Sâ'];
  const today = new Date();
  const weekDays = [];
  for (let i = 6; i >= 0; i--) {
    const d = new Date(today); d.setDate(today.getDate()-i);
    const k = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
    weekDays.push({ k, day: dayNames[d.getDay()], count: hist[k] ? (hist[k].trucks||[]).length : 0, isToday: i === 0 });
  }
  const maxW = Math.max(...weekDays.map(d=>d.count), 1);

  const weekHTML = `<div class="chart-section"><div class="chart-title">Camioane — ultimele 7 zile</div><div class="week-bars">
    ${weekDays.map(d=>`<div class="week-bar-wrap">
      <div class="week-bar-count">${d.count>0?d.count:''}</div>
      <div class="week-bar ${d.isToday?'today-bar':''}" style="height:${Math.max(d.count/maxW*70,d.count>0?8:3)}px"></div>
      <div class="week-bar-day" style="${d.isToday?'color:var(--accent-cyan)':''}">${d.day}</div>
    </div>`).join('')}
  </div></div>`;

  const dayLabels = ['Duminică','Luni','Marți','Miercuri','Joi','Vineri','Sâmbătă'];
  const monthLabel = ['ian','feb','mar','apr','mai','iun','iul','aug','sep','oct','nov','dec'];
  const todK = todayKey();

  const daysHTML = keys.map((k,idx) => {
    const { trucks:ts=[], resis:rs=[] } = hist[k];
    const d = new Date(k+'T12:00:00');
    const dateLabel = `${dayLabels[d.getDay()]}, ${d.getDate()} ${monthLabel[d.getMonth()]} ${d.getFullYear()}`;
    const isToday = k === todK, isBusiest = k === busiestKey && busiestCount > 0;

    const sorted = [...ts].sort((a,b) => { if(!a.arrivalTime) return 1; if(!b.arrivalTime) return -1; return a.arrivalTime.localeCompare(b.arrivalTime); });
    const rows = [
      ...sorted.map(t => {
        const qty = [t.bancal&&t.nrBancale?`${t.nrBancale} bancale`:t.bancal?'bancale':'', t.cutii&&t.nrCutii?`${t.nrCutii} cutii`:t.cutii?'cutii':''].filter(Boolean).join(', ');
        return `<div class="entry-row"><span class="entry-type badge-truck">CAM</span><span class="entry-time">${t.arrivalTime||'–'}</span><span class="entry-firma">${t.firma||'<span style="opacity:.4">Firmă necunoscută</span>'}</span>${qty?`<span class="entry-qty">${qty}</span>`:''}${t.semnatura?`<span class="entry-sig">✍ ${t.semnatura}</span>`:''}</div>`;
      }),
      ...rs.map(r => {
        const qty = [r.bancal&&r.nrBancale?`${r.nrBancale} bancale`:r.bancal?'bancale':'', r.cutii&&r.nrCutii?`${r.nrCutii} cutii`:r.cutii?'cutii':''].filter(Boolean).join(', ');
        const timeStr = r.ts ? (r.ts.split(' ')[1]||'–') : '–';
        return `<div class="entry-row"><span class="entry-type badge-resi">RESI</span><span class="entry-time" style="color:var(--accent-rose)">${timeStr}</span><span class="entry-firma">${r.descriere||'<span style="opacity:.4">Fără descriere</span>'}</span>${qty?`<span class="entry-qty">${qty}</span>`:''}${r.semnatura?`<span class="entry-sig">✍ ${r.semnatura}</span>`:''}</div>`;
      })
    ].join('');

    return `<div class="day-section">
      <div class="day-header ${isToday?'open':''}" id="dh-${idx}" onclick="toggleDay(${idx})">
        <div class="day-header-left">
          <span class="day-date-label" style="${isToday?'color:var(--accent-cyan)':''}">${dateLabel}</span>
          <div class="day-badges">
            ${ts.length?`<span class="day-badge badge-truck">🚛 ${ts.length}</span>`:''}
            ${rs.length?`<span class="day-badge badge-resi">↩ ${rs.length}</span>`:''}
            ${isBusiest?`<span class="day-badge badge-hot">🔥 Cea mai aglomerată</span>`:''}
          </div>
        </div>
        <span class="day-chevron">▼</span>
      </div>
      <div class="day-entries ${isToday?'open':''}" id="de-${idx}">
        ${rows||'<div class="entry-row" style="color:var(--text-muted);font-size:0.78rem">Nicio înregistrare completă</div>'}
      </div>
    </div>`;
  }).join('');

  return statsHTML + weekHTML + daysHTML;
}
</script>
</body>
</html>
