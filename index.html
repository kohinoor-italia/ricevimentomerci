<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Registro Magazzino</title>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg-deep: #0a0f1e;
    --bg-mid: #0d1630;
    --glass-bg: rgba(255,255,255,0.04);
    --glass-border: rgba(255,255,255,0.10);
    --glass-hover: rgba(255,255,255,0.07);
    --accent-blue: #4f8ef7;
    --accent-cyan: #38e8c8;
    --accent-violet: #a78bfa;
    --accent-rose: #f87171;
    --accent-amber: #fbbf24;
    --accent-green: #4ade80;
    --text-primary: #e8edf8;
    --text-secondary: #8899bb;
    --text-muted: #445577;
    --shadow-glass: 0 8px 32px rgba(0,0,0,0.4), 0 1px 0 rgba(255,255,255,0.06) inset;
    --shadow-hover: 0 16px 48px rgba(0,0,0,0.5), 0 1px 0 rgba(255,255,255,0.10) inset;
    --radius-lg: 18px;
    --radius-md: 13px;
    --radius-sm: 9px;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Sora', sans-serif;
    background: var(--bg-deep);
    color: var(--text-primary);
    min-height: 100vh;
    overflow-x: hidden;
  }
  body::before {
    content: '';
    position: fixed; inset: 0;
    background:
      radial-gradient(ellipse 70% 55% at 15% 0%, rgba(248,113,113,0.09) 0%, transparent 60%),
      radial-gradient(ellipse 55% 45% at 85% 100%, rgba(79,142,247,0.10) 0%, transparent 55%),
      radial-gradient(ellipse 40% 35% at 50% 50%, rgba(56,232,200,0.04) 0%, transparent 50%);
    pointer-events: none; z-index: 0;
  }
  body::after {
    content: '';
    position: fixed; inset: 0;
    background-image:
      linear-gradient(rgba(79,142,247,0.025) 1px, transparent 1px),
      linear-gradient(90deg, rgba(79,142,247,0.025) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none; z-index: 0;
  }
  .page {
    position: relative; z-index: 1;
    display: flex; flex-direction: column;
    min-height: 100vh;
    padding: 20px 20px 80px;
    max-width: 1600px; margin: 0 auto;
  }

/* SYNC STATUS */
.sync-bar {
  display: flex; align-items: center; gap: 8px;
  padding: 7px 14px; border-radius: var(--radius-sm);
  background: rgba(255,255,255,0.03); border: 1px solid var(--glass-border);
  margin-bottom: 14px; font-size: 0.74rem; color: var(--text-muted);
  transition: all 0.3s ease;
}
.sync-bar.syncing { border-color: rgba(251,191,36,0.35); background: rgba(251,191,36,0.05); color: var(--accent-amber); }
.sync-bar.synced  { border-color: rgba(74,222,128,0.3);  background: rgba(74,222,128,0.05);  color: var(--accent-green); }
.sync-bar.error   { border-color: rgba(248,113,113,0.35); background: rgba(248,113,113,0.05); color: var(--accent-rose); }
.sync-dot { width: 7px; height: 7px; border-radius: 50%; background: currentColor; flex-shrink: 0; }
.sync-dot.pulse { animation: syncPulse 1.2s ease-in-out infinite; }
@keyframes syncPulse { 0%,100%{opacity:1}50%{opacity:0.3} }

/* ACTIVE DAY BANNER */
.active-day-banner {
  display: none; align-items: center; gap: 12px;
  padding: 10px 18px; border-radius: var(--radius-md);
  background: rgba(167,139,250,0.10); border: 1px solid rgba(167,139,250,0.35);
  margin-bottom: 16px; animation: cardIn 0.3s ease;
}
.active-day-banner.visible { display: flex; }
.adb-icon { font-size: 1rem; }
.adb-text { flex: 1; font-size: 0.82rem; color: var(--accent-violet); font-weight: 600; }
.adb-date { font-family: 'JetBrains Mono', monospace; font-size: 0.78rem; color: var(--text-secondary); }
.adb-back {
  display: flex; align-items: center; gap: 6px;
  padding: 6px 13px; border-radius: var(--radius-sm);
  border: 1px solid rgba(56,232,200,0.4); background: rgba(56,232,200,0.08);
  color: var(--accent-cyan); font-family: 'Sora', sans-serif;
  font-size: 0.75rem; font-weight: 600; cursor: pointer; transition: all 0.18s;
}
.adb-back:hover { background: rgba(56,232,200,0.18); }

/* HEADER */
.header {
  display: flex; align-items: center; justify-content: space-between;
  gap: 20px; margin-bottom: 24px; flex-wrap: wrap;
}
.header-left h1 {
  font-size: clamp(1.4rem, 3vw, 2rem); font-weight: 700; letter-spacing: -0.03em;
  background: linear-gradient(135deg, #e8edf8 0%, var(--accent-cyan) 100%);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
  line-height: 1.1;
}
.header-left p { color: var(--text-secondary); font-size: 0.82rem; margin-top: 5px; font-weight: 300; }
.clock-card {
  background: var(--glass-bg); border: 1px solid var(--glass-border);
  border-radius: var(--radius-md); padding: 12px 20px; text-align: right;
  backdrop-filter: blur(16px); box-shadow: var(--shadow-glass);
}
.clock-time {
  font-family: 'JetBrains Mono', monospace; font-size: clamp(1.4rem, 2.5vw, 2rem);
  font-weight: 500; color: var(--accent-cyan); letter-spacing: 0.04em;
  text-shadow: 0 0 20px rgba(56,232,200,0.3);
}
.clock-date { font-size: 0.75rem; color: var(--text-secondary); margin-top: 3px; letter-spacing: 0.06em; text-transform: uppercase; }

/* MAIN LAYOUT */
.main-layout {
  display: grid; grid-template-columns: 1fr 1fr;
  gap: 20px; flex: 1; align-items: start;
}
.column-left { grid-column: 1; display: flex; flex-direction: column; gap: 16px; }
.column-right { grid-column: 2; display: flex; flex-direction: column; gap: 16px; border-left: 1px solid rgba(248,113,113,0.10); padding-left: 20px; }

/* COLUMNS */
.col-header {
  display: flex; align-items: center; justify-content: space-between;
  gap: 10px; padding-bottom: 14px;
  border-bottom: 1px solid rgba(255,255,255,0.06); margin-bottom: 4px; flex-wrap: wrap;
}
.col-title { display: flex; align-items: center; gap: 10px; font-size: 0.85rem; font-weight: 700; letter-spacing: 0.09em; text-transform: uppercase; }
.col-dot { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; }
.dot-blue { background: var(--accent-blue); box-shadow: 0 0 10px var(--accent-blue); }
.dot-rose { background: var(--accent-rose); box-shadow: 0 0 10px var(--accent-rose); }
.col-count { font-family: 'JetBrains Mono', monospace; font-size: 0.72rem; color: var(--text-muted); background: rgba(255,255,255,0.04); border: 1px solid var(--glass-border); border-radius: 20px; padding: 2px 9px; }

/* ADD BUTTON */
.btn-add {
  display: flex; align-items: center; gap: 7px; padding: 8px 15px;
  border-radius: var(--radius-sm); border: 1px solid rgba(79,142,247,0.35);
  background: rgba(79,142,247,0.10); color: var(--accent-blue);
  font-family: 'Sora', sans-serif; font-size: 0.78rem; font-weight: 600;
  cursor: pointer; transition: all 0.2s ease; letter-spacing: 0.03em; white-space: nowrap;
}
.btn-add:hover { background: rgba(79,142,247,0.20); border-color: rgba(79,142,247,0.65); box-shadow: 0 0 18px rgba(79,142,247,0.18); transform: translateY(-1px); }
.btn-add-rose { border-color: rgba(248,113,113,0.35); background: rgba(248,113,113,0.09); color: var(--accent-rose); }
.btn-add-rose:hover { background: rgba(248,113,113,0.18); border-color: rgba(248,113,113,0.65); box-shadow: 0 0 18px rgba(248,113,113,0.18); }

/* CARDS LIST */
.cards-list { display: flex; flex-direction: column; gap: 12px; }

/* CARD */
.card {
  background: var(--glass-bg); border: 1px solid var(--glass-border);
  border-radius: var(--radius-lg); backdrop-filter: blur(20px);
  box-shadow: var(--shadow-glass); overflow: hidden;
  transition: box-shadow 0.25s ease, border-color 0.25s ease;
  animation: cardIn 0.3s cubic-bezier(0.34,1.56,0.64,1) both;
}
@keyframes cardIn { from { opacity: 0; transform: translateY(12px) scale(0.98); } to { opacity: 1; transform: translateY(0) scale(1); } }
.card:hover { box-shadow: var(--shadow-hover); border-color: rgba(255,255,255,0.15); }
.card.is-compact { cursor: pointer; }
.card.is-compact:hover { border-color: rgba(79,142,247,0.4); }
.card.is-compact.resi-card:hover { border-color: rgba(248,113,113,0.4); }

/* COMPACT VIEW */
.card-compact-view { display: none; padding: 11px 16px; gap: 0; flex-direction: column; }
.card.is-compact .card-compact-view { display: flex; }
.card.is-compact .card-header, .card.is-compact .card-body { display: none; }

.compact-top { display: flex; align-items: center; gap: 9px; flex-wrap: wrap; }
.compact-badge { font-family: 'JetBrains Mono', monospace; font-size: 0.63rem; padding: 2px 8px; border-radius: 20px; font-weight: 700; flex-shrink: 0; }
.compact-badge-blue { background: rgba(79,142,247,0.15); color: var(--accent-blue); border: 1px solid rgba(79,142,247,0.3); }
.compact-badge-rose { background: rgba(248,113,113,0.12); color: var(--accent-rose); border: 1px solid rgba(248,113,113,0.25); }
.compact-time { font-family: 'JetBrains Mono', monospace; font-size: 0.68rem; color: var(--accent-cyan); flex-shrink: 0; }
.compact-firma { font-size: 0.85rem; font-weight: 700; color: var(--text-primary); flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.compact-pills { display: flex; gap: 5px; flex-shrink: 0; flex-wrap: wrap; }
.compact-pill { font-size: 0.66rem; padding: 2px 7px; border-radius: 20px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.08); color: var(--text-secondary); font-family: 'JetBrains Mono', monospace; }
.compact-sig { font-size: 0.70rem; color: var(--text-muted); flex-shrink: 0; }
.compact-expand-hint { font-size: 0.61rem; color: var(--text-muted); letter-spacing: 0.06em; text-transform: uppercase; margin-left: auto; flex-shrink: 0; opacity: 0.6; }
.compact-desc {
  margin-top: 6px; padding-top: 6px;
  border-top: 1px solid rgba(255,255,255,0.05);
  font-size: 0.77rem; color: var(--text-secondary);
  line-height: 1.45; display: -webkit-box;
  -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
}
.compact-desc:empty { display: none; }
.compact-meta { display: flex; align-items: center; gap: 8px; margin-top: 5px; flex-wrap: wrap; }
.compact-meta-pill { font-size: 0.64rem; padding: 1px 7px; border-radius: 20px; font-family: 'JetBrains Mono', monospace; font-weight: 600; }
.meta-prog { background: rgba(79,142,247,0.12); color: var(--accent-blue); border: 1px solid rgba(79,142,247,0.25); }
.meta-nonprog { background: rgba(248,113,113,0.10); color: var(--accent-rose); border: 1px solid rgba(248,113,113,0.22); }
.meta-unknown { background: rgba(251,191,36,0.10); color: var(--accent-amber); border: 1px solid rgba(251,191,36,0.22); }
.meta-auth { background: rgba(74,222,128,0.10); color: var(--accent-green); border: 1px solid rgba(74,222,128,0.22); }
.meta-noauth { background: rgba(248,113,113,0.10); color: var(--accent-rose); border: 1px solid rgba(248,113,113,0.22); }

/* EDITING STATE */
.card.is-editing { border-color: rgba(251,191,36,0.4) !important; box-shadow: 0 0 0 3px rgba(251,191,36,0.07), var(--shadow-hover); }
.confirm-bar {
  display: none; align-items: center; justify-content: flex-end; gap: 10px;
  padding: 10px 16px; border-top: 1px solid rgba(251,191,36,0.15); background: rgba(251,191,36,0.04);
}
.card.is-editing .confirm-bar { display: flex; }
.btn-confirm {
  display: flex; align-items: center; gap: 6px; padding: 7px 16px;
  border-radius: var(--radius-sm); border: 1px solid rgba(56,232,200,0.4);
  background: rgba(56,232,200,0.10); color: var(--accent-cyan);
  font-family: 'Sora', sans-serif; font-size: 0.78rem; font-weight: 600;
  cursor: pointer; transition: all 0.2s ease;
}
.btn-confirm:hover { background: rgba(56,232,200,0.20); border-color: rgba(56,232,200,0.65); box-shadow: 0 0 14px rgba(56,232,200,0.18); }
.btn-cancel-edit {
  display: flex; align-items: center; gap: 6px; padding: 7px 14px;
  border-radius: var(--radius-sm); border: 1px solid rgba(255,255,255,0.08);
  background: rgba(255,255,255,0.04); color: var(--text-secondary);
  font-family: 'Sora', sans-serif; font-size: 0.78rem; font-weight: 600;
  cursor: pointer; transition: all 0.2s ease;
}
.btn-cancel-edit:hover { background: rgba(255,255,255,0.09); color: var(--text-primary); }
.editing-label { font-size: 0.72rem; color: var(--accent-amber); letter-spacing: 0.05em; font-weight: 600; flex: 1; }

/* CARD HEADER & BODY */
.card-header { display: flex; align-items: center; justify-content: space-between; padding: 12px 16px 10px; border-bottom: 1px solid rgba(255,255,255,0.055); gap: 8px; }
.card-number { font-family: 'JetBrains Mono', monospace; font-size: 0.69rem; color: var(--text-muted); background: rgba(255,255,255,0.04); border: 1px solid var(--glass-border); border-radius: 20px; padding: 2px 9px; flex-shrink: 0; }
.card-timestamp { font-family: 'JetBrains Mono', monospace; font-size: 0.69rem; color: var(--accent-cyan); opacity: 0.65; flex: 1; text-align: right; margin-right: 6px; }
.btn-icon { width: 28px; height: 28px; border-radius: 7px; border: 1px solid var(--glass-border); background: rgba(255,255,255,0.03); color: var(--text-secondary); cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 0.8rem; transition: all 0.18s; flex-shrink: 0; }
.btn-icon:hover { background: rgba(255,255,255,0.09); color: var(--text-primary); }
.btn-icon.delete:hover { background: rgba(248,113,113,0.14); color: var(--accent-rose); border-color: rgba(248,113,113,0.35); }
.card-body { padding: 14px 16px 16px; display: flex; flex-direction: column; gap: 12px; }
.field { display: flex; flex-direction: column; gap: 5px; }
label { font-size: 0.69rem; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; color: var(--text-muted); }
input[type="text"], textarea, select { background: rgba(255,255,255,0.045); border: 1px solid rgba(255,255,255,0.08); border-radius: var(--radius-sm); color: var(--text-primary); font-family: 'Sora', sans-serif; font-size: 0.84rem; padding: 9px 12px; outline: none; transition: border-color 0.2s, background 0.2s, box-shadow 0.2s; width: 100%; }
textarea { resize: vertical; min-height: 58px; }
input:focus, textarea:focus, select:focus { border-color: rgba(79,142,247,0.5); background: rgba(79,142,247,0.055); box-shadow: 0 0 0 3px rgba(79,142,247,0.10); }
@keyframes fieldPulse { 0% { border-color: rgba(255,255,255,0.08); box-shadow: none; } 50% { border-color: rgba(251,191,36,0.55); box-shadow: 0 0 0 3px rgba(251,191,36,0.10); } 100% { border-color: rgba(255,255,255,0.08); box-shadow: none; } }
input.field-required-pulse { animation: fieldPulse 2.4s ease-in-out infinite; border-color: rgba(251,191,36,0.35); }
input.field-required-pulse:focus { animation: none; border-color: rgba(79,142,247,0.5); background: rgba(79,142,247,0.055); box-shadow: 0 0 0 3px rgba(79,142,247,0.10); }

/* RADIO PILLS */
.radio-group { display: flex; flex-wrap: wrap; gap: 6px; }
.radio-pill { display: flex; align-items: center; gap: 6px; cursor: pointer; user-select: none; font-size: 0.78rem; font-weight: 600; padding: 6px 13px; border-radius: 50px; border: 1.5px solid var(--glass-border); background: rgba(255,255,255,0.03); color: var(--text-secondary); transition: all 0.2s ease; white-space: nowrap; }
.radio-pill input[type="radio"] { display: none; }
.radio-pill:hover { background: rgba(255,255,255,0.07); color: var(--text-primary); }
.radio-dot { width: 7px; height: 7px; border-radius: 50%; border: 1.5px solid currentColor; flex-shrink: 0; transition: all 0.18s; opacity: 0.5; }
.radio-pill.opt-yes:has(input:checked) { border-color: rgba(79,142,247,0.55); background: rgba(79,142,247,0.10); color: var(--accent-blue); }
.radio-pill.opt-yes input:checked ~ .radio-dot { background: var(--accent-blue); border-color: var(--accent-blue); opacity: 1; }
.radio-pill.opt-no:has(input:checked) { border-color: rgba(248,113,113,0.55); background: rgba(248,113,113,0.10); color: var(--accent-rose); }
.radio-pill.opt-no input:checked ~ .radio-dot { background: var(--accent-rose); border-color: var(--accent-rose); opacity: 1; }
.radio-pill.opt-unknown:has(input:checked) { border-color: rgba(251,191,36,0.45); background: rgba(251,191,36,0.08); color: var(--accent-amber); }
.radio-pill.opt-unknown input:checked ~ .radio-dot { background: var(--accent-amber); border-color: var(--accent-amber); opacity: 1; }
.radio-pill.opt-auth:has(input:checked) { border-color: rgba(74,222,128,0.55); background: rgba(74,222,128,0.10); color: var(--accent-green); }
.radio-pill.opt-auth input:checked ~ .radio-dot { background: var(--accent-green); border-color: var(--accent-green); opacity: 1; }
.radio-pill.opt-noauth:has(input:checked) { border-color: rgba(248,113,113,0.55); background: rgba(248,113,113,0.10); color: var(--accent-rose); }
.radio-pill.opt-noauth input:checked ~ .radio-dot { background: var(--accent-rose); border-color: var(--accent-rose); opacity: 1; }

/* NUMBER INPUTS */
input[type="number"] { background: rgba(255,255,255,0.045); border: 1px solid rgba(255,255,255,0.08); border-radius: var(--radius-sm); color: var(--text-primary); font-family: 'Sora', sans-serif; font-size: 0.84rem; padding: 9px 12px; outline: none; transition: border-color 0.2s, background 0.2s, box-shadow 0.2s; width: 100%; -moz-appearance: textfield; }
input[type="number"]::-webkit-outer-spin-button, input[type="number"]::-webkit-inner-spin-button { -webkit-appearance: none; }
input[type="number"]:focus { border-color: rgba(56,232,200,0.45); background: rgba(56,232,200,0.04); box-shadow: 0 0 0 3px rgba(56,232,200,0.08); }
.qty-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 2px; }
.qty-block { display: flex; flex-direction: column; gap: 5px; }
.qty-block label { font-size: 0.67rem; color: var(--text-muted); letter-spacing: 0.07em; text-transform: uppercase; font-weight: 600; }
.qty-block.hidden { display: none; }

/* CHECKBOXES */
.check-group { display: flex; flex-wrap: wrap; gap: 6px; }
.check-label { display: flex; align-items: center; gap: 7px; cursor: pointer; user-select: none; font-size: 0.78rem; color: var(--text-secondary); padding: 6px 13px; border-radius: var(--radius-sm); border: 1px solid var(--glass-border); background: rgba(255,255,255,0.03); transition: all 0.18s; font-weight: 500; }
.check-label:hover { background: rgba(255,255,255,0.07); color: var(--text-primary); }
.check-label input[type="checkbox"] { display: none; }
.check-box { width: 16px; height: 16px; border-radius: 4px; border: 1.5px solid var(--text-muted); display: flex; align-items: center; justify-content: center; transition: all 0.18s; flex-shrink: 0; font-size: 0.65rem; }
.check-label.bancal input:checked ~ .check-box { background: var(--accent-cyan); border-color: var(--accent-cyan); box-shadow: 0 0 8px rgba(56,232,200,0.4); }

/* SIGNATURE */
.signature-wrap { position: relative; }
.signature-icon { position: absolute; right: 11px; top: 50%; transform: translateY(-50%); font-size: 0.9rem; opacity: 0.28; pointer-events: none; }
.signature-wrap input { padding-right: 32px; }

/* EMPTY STATE */
.empty-state { text-align: center; padding: 28px 16px; color: var(--text-muted); font-size: 0.8rem; border: 1px dashed rgba(255,255,255,0.06); border-radius: var(--radius-lg); letter-spacing: 0.04em; line-height: 1.6; }
.empty-state .emoji { font-size: 1.6rem; display: block; margin-bottom: 8px; }

/* TOAST */
.toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: rgba(30,40,65,0.95); border: 1px solid var(--glass-border); border-radius: var(--radius-md); padding: 10px 18px; font-size: 0.8rem; color: var(--text-primary); box-shadow: 0 12px 40px rgba(0,0,0,0.5); backdrop-filter: blur(20px); z-index: 999; animation: toastIn 0.28s ease; max-width: 280px; text-align: center; }
@keyframes toastIn { from { opacity: 0; transform: translateX(-50%) translateY(14px); } to { opacity: 1; transform: translateX(-50%) translateY(0); } }
.toast.fade-out { animation: toastOut 0.28s ease forwards; }
@keyframes toastOut { to { opacity: 0; transform: translateX(-50%) translateY(8px); } }

/* FAB BUTTONS */
.fab-cal {
  position: fixed; bottom: 28px; right: 28px;
  width: 52px; height: 52px; border-radius: 50%;
  background: rgba(79,142,247,0.18); border: 1.5px solid rgba(79,142,247,0.45);
  color: var(--accent-blue); cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  box-shadow: 0 8px 28px rgba(79,142,247,0.2);
  transition: all 0.22s ease; z-index: 100; backdrop-filter: blur(12px);
}
.fab-cal:hover { background: rgba(79,142,247,0.28); border-color: rgba(79,142,247,0.7); box-shadow: 0 12px 36px rgba(79,142,247,0.3); transform: translateY(-2px) scale(1.05); }
.fab-day {
  position: fixed; bottom: 28px; left: 28px;
  width: 52px; height: 52px; border-radius: 50%;
  background: rgba(167,139,250,0.15); border: 1.5px solid rgba(167,139,250,0.45);
  color: var(--accent-violet); cursor: pointer;
  display: flex; align-items: center; justify-content: center;

<script>
// ─── SUPABASE CONFIG ─────────────────────────────────────────────────────────
const SUPABASE_URL = 'https://wvqopsvqmemkxhllajqb.supabase.co';
const SUPABASE_KEY = 'sb_publishable_8-Zs8sEHZtFnQr4lE_W5Eg_kEhMiEGf';

const sbHeaders = {
  'Content-Type': 'application/json',
  'apikey': SUPABASE_KEY,
  'Authorization': `Bearer ${SUPABASE_KEY}`,
  'Prefer': 'return=minimal'
};

async function sbGet(table, params = '') {
  const res = await fetch(`${SUPABASE_URL}/rest/v1/${table}?${params}`, {
    headers: { ...sbHeaders, 'Prefer': 'return=representation' }
  });
  if (!res.ok) throw new Error(await res.text());
  return res.json();
}

async function sbUpsert(table, data) {
  const res = await fetch(`${SUPABASE_URL}/rest/v1/${table}`, {
    method: 'POST',
    headers: { ...sbHeaders, 'Prefer': 'resolution=merge-duplicates,return=minimal' },
    body: JSON.stringify(data)
  });
  if (!res.ok) throw new Error(await res.text());
}

async function sbDelete(table, id) {
  const res = await fetch(`${SUPABASE_URL}/rest/v1/${table}?id=eq.${encodeURIComponent(id)}`, {
    method: 'DELETE',
    headers: sbHeaders
  });
  if (!res.ok) throw new Error(await res.text());
}

// Convert flat DB row → app object
function dbToTruck(row) {
  return {
    id: row.id,
    ts: row.ts || '',
    firma: row.firma || '',
    programat: row.programat || '',
    bancal: !!row.bancal,
    nrBancale: row.nr_bancale || '',
    cutii: !!row.cutii,
    nrCutii: row.nr_cutii || '',
    comentariu: row.comentariu || '',
    semnatura: row.semnatura || '',
    arrivalTime: row.arrival_time || '',
    collapsed: !!row.collapsed,
    editing: false,
    dateKey: row.date_key
  };
}
function truckToDb(t, dateKey) {
  return {
    id: t.id,
    date_key: dateKey || t.dateKey || todayKey(),
    ts: t.ts || '',
    firma: t.firma || '',
    programat: t.programat || '',
    bancal: !!t.bancal,
    nr_bancale: t.nrBancale || '',
    cutii: !!t.cutii,
    nr_cutii: t.nrCutii || '',
    comentariu: t.comentariu || '',
    semnatura: t.semnatura || '',
    arrival_time: t.arrivalTime || '',
    collapsed: !!t.collapsed
  };
}

function dbToResi(row) {
  return {
    id: row.id,
    ts: row.ts || '',
    descriere: row.descriere || '',
    autorizat: row.autorizat || '',
    bancal: !!row.bancal,
    nrBancale: row.nr_bancale || '',
    cutii: !!row.cutii,
    nrCutii: row.nr_cutii || '',
    comentariu: row.comentariu || '',
    semnatura: row.semnatura || '',
    collapsed: !!row.collapsed,
    editing: false,
    dateKey: row.date_key
  };
}
function resiToDb(r, dateKey) {
  return {
    id: r.id,
    date_key: dateKey || r.dateKey || todayKey(),
    ts: r.ts || '',
    descriere: r.descriere || '',
    autorizat: r.autorizat || '',
    bancal: !!r.bancal,
    nr_bancale: r.nrBancale || '',
    cutii: !!r.cutii,
    nr_cutii: r.nrCutii || '',
    comentariu: r.comentariu || '',
    semnatura: r.semnatura || '',
    collapsed: !!r.collapsed
  };
}

// ─── SYNC STATUS ─────────────────────────────────────────────────────────────
function setSyncStatus(state, msg) {
  const bar = document.getElementById('sync-bar');
  const dot = document.getElementById('sync-dot');
  const txt = document.getElementById('sync-text');
  bar.className = 'sync-bar ' + state;
  dot.className = 'sync-dot' + (state === 'syncing' ? ' pulse' : '');
  txt.textContent = msg;
}

// Debounced save
let saveTimer = null;
function scheduleDbSave(type, obj, dKey) {
  clearTimeout(saveTimer);
  saveTimer = setTimeout(async () => {
    setSyncStatus('syncing', 'Salvataggio in corso…');
    try {
      if (type === 'truck') await sbUpsert('trucks', truckToDb(obj, dKey));
      else await sbUpsert('resi', resiToDb(obj, dKey));
      setSyncStatus('synced', 'Salvato su Supabase ✓');
    } catch(e) {
      setSyncStatus('error', 'Errore salvataggio: ' + e.message);
      console.error(e);
    }
  }, 600);
}

// ─── STATE ───────────────────────────────────────────────────────────────────
let trucks = [];
let resis  = [];
let truckCount = 0;
let resiCount  = 0;
let activeDay = null; // null = today

// ─── CLOCK ───────────────────────────────────────────────────────────────────
function updateClock() {
  const now = new Date();
  const gi = ['Domenica','Lunedì','Martedì','Mercoledì','Giovedì','Venerdì','Sabato'][now.getDay()];
  const mese = ['gennaio','febbraio','marzo','aprile','maggio','giugno','luglio','agosto','settembre','ottobre','novembre','dicembre'][now.getMonth()];
  document.getElementById('clock').textContent = now.toLocaleTimeString('it-IT', { hour12: false });
  document.getElementById('clock-date').textContent = `${gi}, ${now.getDate()} ${mese} ${now.getFullYear()}`;
}
setInterval(updateClock, 1000);
updateClock();

function nowStamp() {
  const d = new Date();
  return d.toLocaleString('it-IT', { day:'2-digit', month:'2-digit', year:'numeric', hour:'2-digit', minute:'2-digit', hour12: false });
}

function toast(msg) {
  const t = document.createElement('div');
  t.className = 'toast'; t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(() => { t.classList.add('fade-out'); setTimeout(() => t.remove(), 280); }, 2400);
}

function updateCounts() {
  const tc = trucks.length, rc = resis.length;
  document.getElementById('count-trucks').textContent = tc === 0 ? 'nessuna' : tc === 1 ? '1 registrazione' : `${tc} registrazioni`;
  document.getElementById('count-resi').textContent   = rc === 0 ? 'nessuna' : rc === 1 ? '1 registrazione' : `${rc} registrazioni`;
}

function todayKey() {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

function formatKeyLabel(k) {
  const d = new Date(k + 'T12:00:00');
  const days = ['Domenica','Lunedì','Martedì','Mercoledì','Giovedì','Venerdì','Sabato'];
  const months = ['gennaio','febbraio','marzo','aprile','maggio','giugno','luglio','agosto','settembre','ottobre','novembre','dicembre'];
  return `${days[d.getDay()]}, ${d.getDate()} ${months[d.getMonth()]} ${d.getFullYear()}`;
}

// ─── LOAD DAY FROM SUPABASE ───────────────────────────────────────────────────
async function loadDay(key) {
  setSyncStatus('syncing', 'Caricamento…');
  try {
    const [tRows, rRows] = await Promise.all([
      sbGet('trucks', `date_key=eq.${key}&order=created_at.asc`),
      sbGet('resi',   `date_key=eq.${key}&order=created_at.asc`)
    ]);
    trucks = tRows.map(dbToTruck);
    resis  = rRows.map(dbToResi);
    truckCount = trucks.length;
    resiCount  = resis.length;
    renderAll();
    setSyncStatus('synced', `Caricato: ${formatKeyLabel(key)} ✓`);
  } catch(e) {
    setSyncStatus('error', 'Errore caricamento: ' + e.message);
    console.error(e);
  }
}

// ─── ACTIVE DAY SWITCHING ──────────────────────────────────────────────────────
async function switchToDay(key) {
  if (key === null || key === todayKey()) { returnToToday(); return; }
  activeDay = key;
  await loadDay(key);
  updateBanner();
  updateFabDay();
  closeDayPicker();
  toast('📅 ' + formatKeyLabel(key));
}

async function returnToToday() {
  activeDay = null;
  await loadDay(todayKey());
  updateBanner();
  updateFabDay();
  closeDayPicker();
}

function updateBanner() {
  const banner = document.getElementById('active-day-banner');
  const label  = document.getElementById('adb-date-label');
  if (activeDay) { banner.classList.add('visible'); label.textContent = formatKeyLabel(activeDay); }
  else banner.classList.remove('visible');
}
function updateFabDay() {
  const fab = document.getElementById('fab-day-btn');
  if (activeDay) fab.classList.add('is-active');
  else fab.classList.remove('is-active');
}

function renderAll() { renderTrucks(); renderResis(); updateCounts(); }

// ─── COMPACT/EXPAND LOGIC ─────────────────────────────────────────────────────
function isTruckComplete(t) { return !!(t.firma && t.firma.trim() && t.semnatura && t.semnatura.trim()); }
function isResiComplete(r)  { return !!(r.descriere && r.descriere.trim() && r.semnatura && r.semnatura.trim()); }

function maybeCollapseCard(id, type) {
  if (type === 'truck') {
    const t = trucks.find(x => x.id === id);
    if (t && isTruckComplete(t) && !t.collapsed) {
      t.collapsed = true; t.editing = false;
      scheduleDbSave('truck', t, activeDay || todayKey());
      renderTrucks(); toast('✅ Card ridotto - clicca per modificare');
    }
  } else {
    const r = resis.find(x => x.id === id);
    if (r && isResiComplete(r) && !r.collapsed) {
      r.collapsed = true; r.editing = false;
      scheduleDbSave('resi', r, activeDay || todayKey());
      renderResis(); toast('✅ Card ridotto - clicca per modificare');
    }
  }
}

// ─── HEATMAP CELL CLICK ATTR REPLACEMENT HINT ───
// inside buildHeatmap: count > 0 -> onclick="closeCalendar(); switchToDay('${k}')"

function expandCard(id, type) {
  if (type === 'truck') {
    const t = trucks.find(x => x.id === id);
    if (t) { t.collapsed = false; t.editing = true; renderTrucks(); }
  } else {
    const r = resis.find(x => x.id === id);
    if (r) { r.collapsed = false; r.editing = true; renderResis(); }
  }
}

function confirmEdit(id, type) {
  if (type === 'truck') {
    const t = trucks.find(x => x.id === id);
    if (t) { t.editing = false; if (isTruckComplete(t)) t.collapsed = true; renderTrucks(); scheduleDbSave('truck', t, activeDay || todayKey()); toast('💾 Modifiche salvate'); }
  } else {
    const r = resis.find(x => x.id === id);
    if (r) { r.editing = false; if (isResiComplete(r)) r.collapsed = true; renderResis(); scheduleDbSave('resi', r, activeDay || todayKey()); toast('💾 Modifiche salvate'); }
  }
}

function cancelEdit(id, type) {
  if (type === 'truck') {
    const t = trucks.find(x => x.id === id);
    if (t) { t.editing = false; t.collapsed = isTruckComplete(t); renderTrucks(); }
  } else {
    const r = resis.find(x => x.id === id);
    if (r) { r.editing = false; r.collapsed = isResiComplete(r); renderResis(); }
  }
}

  const dKey = activeDay || todayKey();
  const entry = { id, ts: nowStamp(), firma:'', programat:'', bancal:false, nrBancale:'', cutii:false, nrCutii:'', comentariu:'', semnatura:'', arrivalTime:'', collapsed:false, editing:false, dateKey: dKey };
  trucks.push(entry);
  renderTrucks(); updateCounts();
  setSyncStatus('syncing', 'Salvataggio in corso…');

    await sbUpsert('trucks', truckToDb(entry, dKey));

function updateTruck(id, field, val) {
  const t = trucks.find(x => x.id === id);
  if (!t) return;
  t[field] = val;
  if (field === 'semnatura' && val.trim() && !t.arrivalTime) {
    t.arrivalTime = new Date().toLocaleTimeString('it-IT', { hour:'2-digit', minute:'2-digit', hour12:false });
  }
  if (field === 'bancal') {
    const el = document.getElementById('qty-bancal-' + id);
    if (el) el.classList.toggle('hidden', !val);
    if (!val) { t.nrBancale = ''; const inp = el && el.querySelector('input'); if(inp) inp.value = ''; }
  } else if (field === 'cutii') {
    const el = document.getElementById('qty-cutii-' + id);
    if (el) el.classList.toggle('hidden', !val);
    if (!val) { t.nrCutii = ''; const inp = el && el.querySelector('input'); if(inp) inp.value = ''; }
  }
  scheduleDbSave('truck', t, activeDay || todayKey());
  if (field === 'semnatura' && val.trim() && isTruckComplete(t)) {
    setTimeout(() => maybeCollapseCard(id, 'truck'), 900);
  }
}

              onchange="updateResi('${r.id}','semnatura',this.value)">
            <span class="signature-icon">✍️</span>
          </div>
        </div>
      </div>
      <div class="confirm-bar">
        <span class="editing-label">✎ Modalità modifica</span>
        <button class="btn-cancel-edit" onclick="cancelEdit('${r.id}','resi')">Annulla</button>
        <button class="btn-confirm" onclick="confirmEdit('${r.id}','resi')">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg>
          Conferma
        </button>
      </div>
    `;
    list.appendChild(card);
  });
}

function updateResi(id, field, val) {
  const r = resis.find(x => x.id === id);
  if (!r) return;
  r[field] = val;
  if (field === 'bancal') {
    const el = document.getElementById('qty-bancal-' + id);
    if (el) el.classList.toggle('hidden', !val);
    if (!val) { r.nrBancale = ''; const inp = el && el.querySelector('input'); if(inp) inp.value = ''; }
  } else if (field === 'cutii') {
    const el = document.getElementById('qty-cutii-' + id);
    if (el) el.classList.toggle('hidden', !val);
    if (!val) { r.nrCutii = ''; const inp = el && el.querySelector('input'); if(inp) inp.value = ''; }
  }
  scheduleDbSave('resi', r, activeDay || todayKey());
  if (field === 'semnatura' && val.trim() && isResiComplete(r)) {
    setTimeout(() => maybeCollapseCard(id, 'resi'), 900);
  }
}

async function buildAndShowDayPicker() {

    ${Array(startWd).fill('<div></div>').join('')}

      const day = i+1;

      const isToday = dpYear===todayY && dpMonth===todayM && day===todayD;
      const isFuture = k > tk;
      const isSelected = activeDay === k || (isToday && activeDay === null);
      const info = allDates[k] || null;
      const hasData = !!(info && (info.t + info.r > 0));

      let bg = 'rgba(255,255,255,0.03)', border = '1px solid rgba(255,255,255,0.06)', color = 'var(--text-muted)', cursor = 'pointer', shadow = '';
      if (isFuture) { bg='transparent'; border='1px solid transparent'; color='rgba(255,255,255,0.08)'; cursor='default'; }
      else if (isSelected) { bg='rgba(167,139,250,0.22)'; border='1px solid rgba(167,139,250,0.6)'; color='var(--accent-violet)'; shadow='0 0 0 2px rgba(167,139,250,0.15)'; }
      else if (isToday) { bg='rgba(56,232,200,0.10)'; border='1px solid rgba(56,232,200,0.4)'; color='var(--accent-cyan)'; }
      else if (hasData) { bg='rgba(79,142,247,0.12)'; border='1px solid rgba(79,142,247,0.3)'; color='var(--accent-blue)'; }

        ${day}

async function dpNavigate(dir) {
  dpMonth += dir;
  if (dpMonth < 0) { dpMonth = 11; dpYear--; }
  if (dpMonth > 11) { dpMonth = 0; dpYear++; }
  await buildAndShowDayPicker();
}

// ─── STATS MODAL ─────────────────────────────────────────────────────────────
let activeStatsMonth = null;

async function openCalendar() {
  document.getElementById('calBody').innerHTML = '<div style="text-align:center;padding:40px;color:var(--text-muted)">⏳ Caricamento statistiche…</div>';
  document.getElementById('calModal').classList.add('open');
  await buildStats();
}
function closeCalendar() { document.getElementById('calModal').classList.remove('open'); }
function toggleDay(idx) {
  document.getElementById('dh-'+idx).classList.toggle('open');
  document.getElementById('de-'+idx).classList.toggle('open');
}

async function switchStatsMonth(m) {
  activeStatsMonth = m;
  await buildStats();
}

async function buildStats() {
  setSyncStatus('syncing', 'Caricamento statistiche…');
  let hist = {};
  try {
    const [tRows, rRows] = await Promise.all([
      sbGet('trucks', 'select=*&order=date_key.asc,created_at.asc'),
      sbGet('resi',   'select=*&order=date_key.asc,created_at.asc')
    ]);
    tRows.forEach(r => { const k=r.date_key; if(!hist[k]) hist[k]={trucks:[],resis:[]}; hist[k].trucks.push(dbToTruck(r)); });
    rRows.forEach(r => { const k=r.date_key; if(!hist[k]) hist[k]={trucks:[],resis:[]}; hist[k].resis.push(dbToResi(r)); });
    setSyncStatus('synced', 'Statistiche caricate ✓');
  } catch(e) {
    setSyncStatus('error', 'Errore: ' + e.message);
    document.getElementById('calBody').innerHTML = `<div class="no-history">❌ Errore caricamento: ${e.message}</div>`;
    return;
  }
  const tk = todayKey();
  const allKeys = Object.keys(hist).sort((a,b) => b.localeCompare(a));
  if (allKeys.length === 0) { document.getElementById('calBody').innerHTML = '<div class="no-history">📭 Nessuno storico salvato ancora.</div>'; return; }
  const months = {};
  allKeys.forEach(k => { const m=k.slice(0,7); months[m]=(months[m]||0)+1; });
  const monthKeys = Object.keys(months).sort((a,b)=>b.localeCompare(a));
  if (!activeStatsMonth || !months[activeStatsMonth]) activeStatsMonth = monthKeys[0];
  document.getElementById('calBody').innerHTML = buildCalendarHTML(hist, allKeys, monthKeys, tk);
}

function buildHeatmap(hist, year, month, daysInMonth, startWd, tk) {
  let html = `<div class="month-heatmap"><div class="chart-title">Mappa attività</div><div class="heatmap-grid">`;
  const shortDays = ['Do', 'Lu', 'Ma', 'Me', 'Gi', 'Ve', 'Sa'];
  
  for(let i=0; i<7; i++) {
    html += `<div class="heatmap-day-label">${shortDays[i]}</div>`;
  }
  
  for(let i=0; i<startWd; i++) {
    html += `<div class="heatmap-cell empty-cell"></div>`;
  }
  
  for(let day=1; day<=daysInMonth; day++) {
    const k = `${year}-${String(month).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
    const count = (hist[k]?.trucks||[]).length + (hist[k]?.resis||[]).length;
    const isToday = k === tk;
    
    let level = 'no-data';
    if(count > 0 && count <= 2) level = 'level-1';
    else if(count > 2 && count <= 5) level = 'level-2';
    else if(count > 5 && count <= 8) level = 'level-3';
    else if(count > 8) level = 'level-4';
    
    const clickAttr = count > 0 ? `onclick="closeCalendar(); switchToDay('${k}')"` : '';
    const hasDataClass = count > 0 ? 'has-data' : '';
    const todayClass = isToday ? 'is-today-cell' : '';
    
    html += `<div class="heatmap-cell ${level} ${hasDataClass} ${todayClass}" ${clickAttr} title="${formatKeyLabel(k)}: ${count} attività">
      <span class="heatmap-date-num">${day}</span>
    </div>`;
  }
  
  html += `</div></div>`;
  return html;
}

function buildCalendarHTML(hist, allKeys, monthKeys, tk) {
  const monthNames = ['gen','feb','mar','apr','mag','giu','lug','ago','set','ott','nov','dic'];

  let totalTrucks=0, totalResis=0, totalBancali=0, totalColli=0;
  const supplierCount = {};
  allKeys.forEach(k => {
    const ts=hist[k].trucks||[], rs=hist[k].resis||[];
    totalTrucks+=ts.length; totalResis+=rs.length;
    ts.forEach(t => {
      if(t.nrBancale) totalBancali+=parseInt(t.nrBancale)||0;
      if(t.nrCutii)   totalColli+=parseInt(t.nrCutii)||0;
      if(t.firma&&t.firma.trim()) supplierCount[t.firma.trim()]=(supplierCount[t.firma.trim()]||0)+1;
    });
    rs.forEach(r => {
      if(r.nrBancale) totalBancali+=parseInt(r.nrBancale)||0;
      if(r.nrCutii)   totalColli+=parseInt(r.nrCutii)||0;
    });
  });
  const avgPerDay = allKeys.length ? (totalTrucks/allKeys.length).toFixed(1) : 0;
  let busiestKey='', busiestCount=0;
  allKeys.forEach(k => { const c=(hist[k].trucks||[]).length+(hist[k].resis||[]).length; if(c>busiestCount){busiestCount=c;busiestKey=k;} });
  const topSuppliers = Object.entries(supplierCount).sort((a,b)=>b[1]-a[1]).slice(0,5);
  const maxSup = topSuppliers.length ? topSuppliers[0][1] : 1;

  const tabsHTML = monthKeys.map(m => {
    const [yr,mo] = m.split('-');
    return `<span class="month-tab ${m===activeStatsMonth?'active':''}" onclick="switchStatsMonth('${m}')">${monthNames[parseInt(mo)-1]} ${yr}</span>`;
  }).join('');

  const mKeys = allKeys.filter(k => k.startsWith(activeStatsMonth));
  const [mY, mM] = activeStatsMonth.split('-').map(Number);
  let mTrucks=0, mResis=0, mBancali=0, mColli=0, mUnauth=0, mProg=0, mNonProg=0, mUnknown=0, mAfter12=0;
  
  mKeys.forEach(k => {
    const ts=hist[k].trucks||[], rs=hist[k].resis||[];
    mTrucks+=ts.length; mResis+=rs.length;
    ts.forEach(t => { 
      if(t.nrBancale) mBancali+=parseInt(t.nrBancale)||0; 
      if(t.nrCutii) mColli+=parseInt(t.nrCutii)||0; 
      if(t.programat==='programmato') mProg++;
      if(t.programat==='non_programmato') mNonProg++;
      if(t.programat==='sconosciuto' || !t.programat) mUnknown++;
      
      // Verifică dacă venirea este după ora 12:00
      if(t.arrivalTime) {
        const parts = t.arrivalTime.split(':');
        if(parts.length >= 2) {
          const hour = parseInt(parts[0], 10);
          const min = parseInt(parts[1], 10);
          if(hour > 12 || (hour === 12 && min > 0)) {
            mAfter12++;
          }
        }
      } else if(t.ts) {
        // Fallback pe timestamp dacă nu are arrivalTime completat explicit
        const timePart = t.ts.split(' ')[1];
        if(timePart) {
          const parts = timePart.split(':');
          const hour = parseInt(parts[0], 10);
          const min = parseInt(parts[1], 10);
          if(hour > 12 || (hour === 12 && min > 0)) {
            mAfter12++;
          }
        }
      }
    });
    rs.forEach(r => { 
      if(r.nrBancale) mBancali+=parseInt(r.nrBancale)||0; 
      if(r.nrCutii) mColli+=parseInt(r.nrCutii)||0; 
      if(r.autorizat==='non_autorizzato') mUnauth++; 
    });
  });

  const today = new Date();
  const dayNames7 = ['Do','Lu','Ma','Me','Gi','Ve','Sa'];
  const chartDays = [];
  for(let i=6;i>=0;i--) {
    const d=new Date(today); d.setDate(today.getDate()-i);
    const k=`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
    chartDays.push({k, day:dayNames7[d.getDay()], tc:(hist[k]?.trucks||[]).length, rc:(hist[k]?.resis||[]).length, isToday:i===0});
  }
  const maxC = Math.max(...chartDays.map(d=>d.tc+d.rc),1);

  const daysInMonth = new Date(mY, mM, 0).getDate();
  const firstDay = new Date(mY, mM-1, 1);
  const startWd = firstDay.getDay() === 0 ? 6 : firstDay.getDay() - 1; // corectare index săptămână (luni=0)
  
  // Calculare dinamică a numărului de rânduri pentru înălțimea graficului (7 label + startWd + zile) / 7 col
  const totalCells = 7 + startWd + daysInMonth;
  const numRows = Math.ceil(totalCells / 7);
  const calculatedHeight = (numRows * 40) + ((numRows - 1) * 4) + 20; // 40px celula aspect-ratio + 4px grid-gap + label-semnalistica-margin

  const weekHTML = `<div class="chart-section"><div class="chart-title">Attività ultimi 7 giorni</div><div class="week-bars" style="height:${calculatedHeight}px">${chartDays.map(d=>{
    const total=d.tc+d.rc; const h=Math.max(total/maxC*calculatedHeight,total>0?6:3);
    const trH=total>0?Math.round(d.tc/total*h):0; const rH=h-trH;
    return `<div class="week-bar-wrap"><div class="week-bar-count">${total>0?total:''}</div><div class="bar-stack" style="height:${h}px"><div class="bar-resi" style="height:${rH}px"></div><div class="bar-truck" style="height:${trH}px"></div></div><div class="week-bar-day ${d.isToday?'today-bar-day':''}">${d.day}</div></div>`;
  }).join('')}</div><div style="display:flex;gap:12px;margin-top:8px;font-size:0.64rem;color:var(--text-muted)"><span style="display:flex;align-items:center;gap:4px"><span style="width:8px;height:8px;border-radius:2px;background:rgba(79,142,247,0.4);display:inline-block"></span>Camion</span><span style="display:flex;align-items:center;gap:4px"><span style="width:8px;height:8px;border-radius:2px;background:rgba(248,113,113,0.3);display:inline-block"></span>Resi</span></div></div>`;

  const heatHTML = buildHeatmap(hist, mY, mM, daysInMonth, startWd, tk);

  const mAvg = mKeys.length ? (mTrucks/mKeys.length).toFixed(1) : '0';
  const monthSummaryHTML = `<div class="month-summary-grid">
    <div class="month-stat-row"><span class="month-stat-icon">🚛</span><span class="month-stat-label">Camion</span><span class="month-stat-val" style="color:var(--accent-blue)">${mTrucks}</span></div>
    <div class="month-stat-row"><span class="month-stat-icon">↩️</span><span class="month-stat-label">Resi</span><span class="month-stat-val" style="color:var(--accent-rose)">${mResis}</span></div>
    <div class="month-stat-row"><span class="month-stat-icon">📦</span><span class="month-stat-label">Bancali</span><span class="month-stat-val">${mBancali}</span></div>
    <div class="month-stat-row"><span class="month-stat-icon">📫</span><span class="month-stat-label">Colli</span><span class="month-stat-val">${mColli}</span></div>
    <div class="month-stat-row"><span class="month-stat-icon">✅</span><span class="month-stat-label">Programmati</span><span class="month-stat-val" style="color:var(--accent-green)">${mProg}</span></div>
    <div class="month-stat-row"><span class="month-stat-icon">❌</span><span class="month-stat-label">Non programmati</span><span class="month-stat-val" style="color:var(--accent-rose)">${mNonProg}</span></div>
    <div class="month-stat-row"><span class="month-stat-icon">❓</span><span class="month-stat-label">Sconosciuto</span><span class="month-stat-val" style="color:var(--accent-amber)">${mUnknown}</span></div>
    <div class="month-stat-row"><span class="month-stat-icon">⚠️</span><span class="month-stat-label">Resi non aut.</span><span class="month-stat-val" style="color:var(--accent-rose)">${mUnauth}</span></div>
    <div class="month-stat-row"><span class="month-stat-icon">🕒</span><span class="month-stat-label">Dopo le 12:00 (Ritardi)</span><span class="month-stat-val" style="color:#f87171;font-weight:700;">${mAfter12}</span></div>
    <div class="month-stat-row"><span class="month-stat-icon">📅</span><span class="month-stat-label">Giorni attivi</span><span class="month-stat-val">${mKeys.length}</span></div>
    <div class="month-stat-row"><span class="month-stat-icon">📊</span><span class="month-stat-label">Media / giorno</span><span class="month-stat-val" style="color:var(--accent-amber)">${mAvg}</span></div>
  </div>`;

  const globalHTML = `<div class="stats-grid">
    <div class="stat-card"><div class="stat-val" style="color:var(--accent-blue)">${totalTrucks}</div><div class="stat-label">Totale camion</div></div>
    <div class="stat-card"><div class="stat-val" style="color:var(--accent-rose)">${totalResis}</div><div class="stat-label">Totale resi</div></div>
    <div class="stat-card"><div class="stat-val" style="color:var(--accent-amber)">${avgPerDay}</div><div class="stat-label">Media cam/g</div></div>
    <div class="stat-card"><div class="stat-val" style="color:var(--accent-cyan)">${totalBancali}</div><div class="stat-label">Bancali totali</div></div>
    <div class="stat-card"><div class="stat-val" style="color:var(--accent-violet)">${totalColli}</div><div class="stat-label">Colli totali</div></div>
    <div class="stat-card"><div class="stat-val" style="color:var(--accent-green)">${allKeys.length}</div><div class="stat-label">Giorni registrati</div></div>
  </div>`;

  const topHTML = topSuppliers.length ? `<div class="chart-section"><div class="chart-title" style="margin-bottom:10px">Top fornitori (tutti i tempi)</div><div class="top-list">${topSuppliers.map(([name,count],i)=>`<div class="top-item"><span class="top-rank">#${i+1}</span><span class="top-name">${name}</span><div class="top-bar-wrap"><div class="top-bar-fill" style="width:${Math.round(count/maxSup*100)}%"></div></div><span class="top-count">${count}×</span></div>`).join('')}</div></div>` : '';

  const dayLabels = ['Domenica','Lunedì','Martedì','Mercoledì','Giovedì','Venerdì','Sabato'];
  const daysHTML = mKeys.map((k,idx) => {
    const { trucks:ts=[], resis:rs=[] } = hist[k];
    const d = new Date(k+'T12:00:00');
    const dateLabel = `${dayLabels[d.getDay()]}, ${d.getDate()} ${monthNames[d.getMonth()]} ${d.getFullYear()}`;
    const isToday = k === tk;
    const isBusiest = k === busiestKey && busiestCount > 0;

    let rowStyle = 'margin-bottom:10px;';
    let headStyle = '';
    if (isToday) headStyle = 'border-color:rgba(56,232,200,0.4);background:rgba(56,232,200,0.06);color:var(--accent-cyan);';
    else if (isBusiest) headStyle = 'border-color:rgba(251,191,36,0.3);background:rgba(251,191,36,0.05);';

    return `
    <div class="day-section" style="${rowStyle}">
      <div class="day-header" id="dh-${idx}" onclick="toggleDay(${idx})" style="${headStyle}">
        <div class="day-header-left">
          <span class="day-chevron">▼</span>
          <span class="day-date-label">${dateLabel}</span>
          ${isToday ? `<span style="font-family:'JetBrains Mono',monospace;font-size:0.62rem;background:rgba(56,232,200,0.12);padding:1px 7px;border-radius:20px;font-weight:700;">OGGI</span>` : ''}
          ${isBusiest ? `<span class="day-badge badge-hot" title="Giorno con più attività nel mese">🔥 Picco</span>` : ''}
        </div>
        <div class="day-badges">
          ${ts.length ? `<span class="day-badge badge-truck">${ts.length} cam</span>` : ''}
          ${rs.length ? `<span class="day-badge badge-resi">${rs.length} resi</span>` : ''}
        </div>
      </div>
      <div class="day-entries" id="de-${idx}">
        ${ts.map((t,ti)=>`
          <div class="entry-row">
            <span class="entry-type" style="background:rgba(79,142,247,0.12);color:var(--accent-blue);">CAMION #${ti+1}</span>
            <span class="entry-time">${t.arrivalTime || (t.ts?t.ts.split(' ')[1]:'–')}</span>
            <span class="entry-firma">${t.firma || 'Fornitore sconosciuto'}</span>
            ${t.semnatura ? `<span class="entry-sig">✍️ ${t.semnatura}</span>` : ''}
            <div class="entry-meta">
              ${t.bancal&&t.nrBancale?`<span class="compact-pill">${t.nrBancale} bancali</span>`:t.bancal?`<span class="compact-pill">bancali</span>`:''}
              ${t.cutii&&t.nrCutii?`<span class="compact-pill">${t.nrCutii} colli</span>`:t.cutii?`<span class="compact-pill">colli</span>`:''}
              ${t.programat==='programmato'?`<span class="compact-meta-pill meta-prog">✓ Prog.</span>`:t.programat==='non_programmato'?`<span class="compact-meta-pill meta-nonprog">✗ Non prog.</span>`:``}
            </div>
            ${t.comentariu ? `<div class="entry-note">“ ${t.comentariu} ”</div>` : ''}
          </div>
        `).join('')}
        ${rs.map((r,ri)=>`
          <div class="entry-row">
            <span class="entry-type" style="background:rgba(248,113,113,0.12);color:var(--accent-rose);">RESO #${ri+1}</span>
            <span class="entry-time">${r.ts?r.ts.split(' ')[1]:'–'}</span>
            <span class="entry-firma">${r.descriere || 'Nessuna descrizione'}</span>
            ${r.semnatura ? `<span class="entry-sig">✍️ ${r.semnatura}</span>` : ''}
            <div class="entry-meta">
              ${r.bancal&&r.nrBancale?`<span class="compact-pill">${r.nrBancale} bancali</span>`:r.bancal?`<span class="compact-pill">bancali</span>`:''}
              ${r.cutii&&r.nrCutii?`<span class="compact-pill">${r.nrCutii} colli</span>`:r.cutii?`<span class="compact-pill">colli</span>`:''}
              ${r.autorizat==='autorizzato'?`<span class="compact-meta-pill meta-auth">✓ Aut.</span>`:r.autorizat==='non_autorizzato'?`<span class="compact-meta-pill meta-noauth">✗ Non aut.</span>`:''}
            </div>
            ${r.comentariu ? `<div class="entry-note">“ ${r.comentariu} ”</div>` : ''}
          </div>
        `).join('')}
      </div>
    </div>`;
  }).join('');

  return `
    ${globalHTML}
    <div style="font-size:0.72rem;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;color:var(--text-muted);margin:24px 0 12px;">Visualizzazione Mensile</div>
    <div class="month-tabs">${tabsHTML}</div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:24px;" class="main-layout">
      <div style="grid-column:1;">${heatHTML}</div>
      <div style="grid-column:2;">${weekHTML}</div>
    </div>
    ${monthSummaryHTML}
    ${topHTML}
    <div style="font-size:0.72rem;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;color:var(--text-muted);margin:24px 0 12px;">Dettaglio Giornaliero (${monthNames[mM-1]} ${mY})</div>
    <div style="max-height:450px;overflow-y:auto;padding-right:4px;scrollbar-width:thin;">${daysHTML}</div>
  `;
}
</script>
</body>
</html>
