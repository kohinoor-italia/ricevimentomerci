<!DOCTYPE html>

<html lang="ro">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Registru Depozit</title>
<link href="[https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap](https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap)" rel="stylesheet">
<style>
  :root {
    --bg-deep: #0a0f1e;
    --bg-mid: #0d1630;
    --glass-bg: rgba(255,255,255,0.04);
    --glass-border: rgba(255,255,255,0.10);
    --glass-hover: rgba(255,255,255,0.07);
    --accent-blue: #4f8ef7;
    --accent-cyan: #38e8c8;
    --accent-violet: #a78bfa;
    --accent-rose: #f87171;
    --accent-amber: #fbbf24;
    --text-primary: #e8edf8;
    --text-secondary: #8899bb;
    --text-muted: #445577;
    --shadow-glass: 0 8px 32px rgba(0,0,0,0.4), 0 1px 0 rgba(255,255,255,0.06) inset;
    --shadow-hover: 0 16px 48px rgba(0,0,0,0.5), 0 1px 0 rgba(255,255,255,0.10) inset;
    --radius-lg: 20px;
    --radius-md: 14px;
    --radius-sm: 10px;
  }

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
font-family: 'Sora', sans-serif;
background: var(--bg-deep);
color: var(--text-primary);
min-height: 100vh;
overflow-x: hidden;
}

/* Ambient background */
body::before {
content: '';
position: fixed;
inset: 0;
background:
radial-gradient(ellipse 80% 60% at 20% 0%, rgba(79,142,247,0.12) 0%, transparent 60%),
radial-gradient(ellipse 60% 50% at 80% 100%, rgba(167,139,250,0.10) 0%, transparent 55%),
radial-gradient(ellipse 50% 40% at 50% 50%, rgba(56,232,200,0.05) 0%, transparent 50%);
pointer-events: none;
z-index: 0;
}

body::after {
content: '';
position: fixed;
inset: 0;
background-image:
linear-gradient(rgba(79,142,247,0.03) 1px, transparent 1px),
linear-gradient(90deg, rgba(79,142,247,0.03) 1px, transparent 1px);
background-size: 40px 40px;
pointer-events: none;
z-index: 0;
}

.container {
position: relative;
z-index: 1;
max-width: 1200px;
margin: 0 auto;
padding: 24px 16px 60px;
}

/* ── HEADER ── */
.header {
display: flex;
flex-wrap: wrap;
align-items: flex-start;
justify-content: space-between;
gap: 20px;
margin-bottom: 36px;
}

.header-left h1 {
font-size: clamp(1.6rem, 4vw, 2.4rem);
font-weight: 700;
letter-spacing: -0.03em;
background: linear-gradient(135deg, #e8edf8 0%, var(--accent-cyan) 100%);
-webkit-background-clip: text;
-webkit-text-fill-color: transparent;
background-clip: text;
line-height: 1.1;
}

.header-left p {
color: var(--text-secondary);
font-size: 0.85rem;
margin-top: 6px;
font-weight: 300;
}

/* Clock */
.clock-card {
background: var(--glass-bg);
border: 1px solid var(--glass-border);
border-radius: var(--radius-md);
padding: 14px 22px;
text-align: right;
backdrop-filter: blur(16px);
-webkit-backdrop-filter: blur(16px);
box-shadow: var(--shadow-glass);
min-width: 200px;
}

.clock-time {
font-family: 'JetBrains Mono', monospace;
font-size: clamp(1.6rem, 3vw, 2.2rem);
font-weight: 500;
color: var(--accent-cyan);
letter-spacing: 0.04em;
text-shadow: 0 0 20px rgba(56,232,200,0.3);
}

.clock-date {
font-size: 0.78rem;
color: var(--text-secondary);
margin-top: 4px;
letter-spacing: 0.06em;
text-transform: uppercase;
}

/* ── SECTION TITLE ── */
.section-header {
display: flex;
align-items: center;
justify-content: space-between;
flex-wrap: wrap;
gap: 12px;
margin-bottom: 18px;
}

.section-title {
display: flex;
align-items: center;
gap: 12px;
font-size: 1rem;
font-weight: 600;
letter-spacing: 0.08em;
text-transform: uppercase;
color: var(--text-secondary);
}

.section-dot {
width: 10px;
height: 10px;
border-radius: 50%;
flex-shrink: 0;
}

.dot-blue { background: var(--accent-blue); box-shadow: 0 0 12px var(--accent-blue); }
.dot-rose { background: var(--accent-rose); box-shadow: 0 0 12px var(--accent-rose); }

.section-count {
font-family: 'JetBrains Mono', monospace;
font-size: 0.75rem;
color: var(--text-muted);
background: rgba(255,255,255,0.04);
border: 1px solid var(--glass-border);
border-radius: 20px;
padding: 3px 10px;
}

/* ── ADD BUTTON ── */
.btn-add {
display: flex;
align-items: center;
gap: 8px;
padding: 9px 18px;
border-radius: var(--radius-sm);
border: 1px solid rgba(79,142,247,0.4);
background: rgba(79,142,247,0.12);
color: var(--accent-blue);
font-family: 'Sora', sans-serif;
font-size: 0.82rem;
font-weight: 600;
cursor: pointer;
transition: all 0.2s ease;
letter-spacing: 0.03em;
}

.btn-add:hover {
background: rgba(79,142,247,0.22);
border-color: rgba(79,142,247,0.7);
box-shadow: 0 0 20px rgba(79,142,247,0.2);
transform: translateY(-1px);
}

.btn-add-rose {
border-color: rgba(248,113,113,0.4);
background: rgba(248,113,113,0.10);
color: var(--accent-rose);
}

.btn-add-rose:hover {
background: rgba(248,113,113,0.20);
border-color: rgba(248,113,113,0.7);
box-shadow: 0 0 20px rgba(248,113,113,0.2);
}

/* ── CARD ── */
.card {
background: var(--glass-bg);
border: 1px solid var(--glass-border);
border-radius: var(--radius-lg);
backdrop-filter: blur(20px);
-webkit-backdrop-filter: blur(20px);
box-shadow: var(--shadow-glass);
margin-bottom: 14px;
overflow: hidden;
transition: box-shadow 0.25s ease, border-color 0.25s ease;
animation: cardIn 0.35s cubic-bezier(0.34,1.56,0.64,1) both;
}

@keyframes cardIn {
from { opacity: 0; transform: translateY(16px) scale(0.98); }
to   { opacity: 1; transform: translateY(0) scale(1); }
}

.card:hover {
box-shadow: var(--shadow-hover);
border-color: rgba(255,255,255,0.16);
}

.card-header {
display: flex;
align-items: center;
justify-content: space-between;
padding: 16px 20px 14px;
border-bottom: 1px solid rgba(255,255,255,0.06);
flex-wrap: wrap;
gap: 10px;
}

.card-number {
font-family: 'JetBrains Mono', monospace;
font-size: 0.72rem;
color: var(--text-muted);
background: rgba(255,255,255,0.04);
border: 1px solid var(--glass-border);
border-radius: 20px;
padding: 3px 10px;
}

.card-timestamp {
font-family: 'JetBrains Mono', monospace;
font-size: 0.72rem;
color: var(--accent-cyan);
opacity: 0.7;
}

.card-actions {
display: flex;
gap: 8px;
margin-left: auto;
}

.btn-icon {
width: 32px; height: 32px;
border-radius: 8px;
border: 1px solid var(--glass-border);
background: rgba(255,255,255,0.04);
color: var(--text-secondary);
cursor: pointer;
display: flex; align-items: center; justify-content: center;
font-size: 0.85rem;
transition: all 0.18s;
}

.btn-icon:hover { background: rgba(255,255,255,0.10); color: var(--text-primary); }
.btn-icon.delete:hover { background: rgba(248,113,113,0.15); color: var(--accent-rose); border-color: rgba(248,113,113,0.4); }

/* ── FORM BODY ── */
.card-body {
padding: 18px 20px 20px;
display: grid;
grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
gap: 14px;
}

.field {
display: flex;
flex-direction: column;
gap: 6px;
}

.field.full { grid-column: 1 / -1; }
.field.half { grid-column: span 1; }

label {
font-size: 0.72rem;
font-weight: 600;
letter-spacing: 0.08em;
text-transform: uppercase;
color: var(--text-muted);
}

input[type="text"],
input[type="date"],
input[type="time"],
textarea,
select {
background: rgba(255,255,255,0.05);
border: 1px solid rgba(255,255,255,0.09);
border-radius: var(--radius-sm);
color: var(--text-primary);
font-family: 'Sora', sans-serif;
font-size: 0.88rem;
padding: 10px 14px;
outline: none;
transition: border-color 0.2s, background 0.2s, box-shadow 0.2s;
width: 100%;
}

textarea { resize: vertical; min-height: 68px; }

input:focus, textarea:focus, select:focus {
border-color: rgba(79,142,247,0.5);
background: rgba(79,142,247,0.06);
box-shadow: 0 0 0 3px rgba(79,142,247,0.12);
}

select option { background: #111827; }

/* ── TOGGLE PILLS (radio groups) ── */
.check-group {
display: flex;
flex-wrap: wrap;
gap: 8px;
margin-top: 2px;
}

/* Simple checkbox group (bancal/cutii) */
.check-label {
display: flex;
align-items: center;
gap: 8px;
cursor: pointer;
user-select: none;
font-size: 0.84rem;
color: var(--text-secondary);
padding: 7px 14px;
border-radius: var(--radius-sm);
border: 1px solid var(--glass-border);
background: rgba(255,255,255,0.03);
transition: all 0.18s;
letter-spacing: 0.01em;
font-weight: 500;
}

.check-label:hover {
background: rgba(255,255,255,0.07);
color: var(--text-primary);
}

.check-label input[type="checkbox"] { display: none; }

.check-box {
width: 18px; height: 18px;
border-radius: 5px;
border: 1.5px solid var(--text-muted);
display: flex; align-items: center; justify-content: center;
transition: all 0.18s;
flex-shrink: 0;
font-size: 0.7rem;
}

.check-label input:checked ~ .check-text { color: var(--text-primary); }
.check-label.bancal input:checked ~ .check-box { background: var(--accent-cyan); border-color: var(--accent-cyan); box-shadow: 0 0 10px rgba(56,232,200,0.4); }

/* ── RADIO PILL GROUP ── */
.radio-group {
display: flex;
flex-wrap: wrap;
gap: 8px;
margin-top: 2px;
}

.radio-pill {
display: flex;
align-items: center;
gap: 7px;
cursor: pointer;
user-select: none;
font-size: 0.83rem;
font-weight: 600;
padding: 8px 16px;
border-radius: 50px;
border: 1.5px solid var(--glass-border);
background: rgba(255,255,255,0.03);
color: var(--text-secondary);
transition: all 0.2s ease;
letter-spacing: 0.02em;
white-space: nowrap;
}

.radio-pill input[type="radio"] { display: none; }

.radio-pill:hover {
background: rgba(255,255,255,0.08);
color: var(--text-primary);
}

.radio-dot {
width: 8px; height: 8px;
border-radius: 50%;
border: 1.5px solid currentColor;
flex-shrink: 0;
transition: all 0.18s;
opacity: 0.5;
}

/* Programat = blue */
.radio-pill.opt-yes input:checked ~ .radio-dot {
background: var(--accent-blue);
border-color: var(--accent-blue);
box-shadow: 0 0 8px rgba(79,142,247,0.6);
opacity: 1;
}
.radio-pill.opt-yes input:checked ~ .radio-text { color: var(--accent-blue); }
.radio-pill.opt-yes input:checked ~ * {  }
.radio-pill.opt-yes:has(input:checked) {
border-color: rgba(79,142,247,0.55);
background: rgba(79,142,247,0.10);
color: var(--accent-blue);
box-shadow: 0 0 16px rgba(79,142,247,0.15);
}

/* Neprogramat = rose */
.radio-pill.opt-no:has(input:checked) {
border-color: rgba(248,113,113,0.55);
background: rgba(248,113,113,0.10);
color: var(--accent-rose);
box-shadow: 0 0 16px rgba(248,113,113,0.15);
}
.radio-pill.opt-no input:checked ~ .radio-dot {
background: var(--accent-rose);
border-color: var(--accent-rose);
box-shadow: 0 0 8px rgba(248,113,113,0.6);
opacity: 1;
}

/* Necunoscut = amber */
.radio-pill.opt-unknown:has(input:checked) {
border-color: rgba(251,191,36,0.45);
background: rgba(251,191,36,0.08);
color: var(--accent-amber);
box-shadow: 0 0 16px rgba(251,191,36,0.12);
}
.radio-pill.opt-unknown input:checked ~ .radio-dot {
background: var(--accent-amber);
border-color: var(--accent-amber);
box-shadow: 0 0 8px rgba(251,191,36,0.5);
opacity: 1;
}

/* Autorizat = violet */
.radio-pill.opt-auth:has(input:checked) {
border-color: rgba(167,139,250,0.55);
background: rgba(167,139,250,0.10);
color: var(--accent-violet);
box-shadow: 0 0 16px rgba(167,139,250,0.15);
}
.radio-pill.opt-auth input:checked ~ .radio-dot {
background: var(--accent-violet);
border-color: var(--accent-violet);
box-shadow: 0 0 8px rgba(167,139,250,0.6);
opacity: 1;
}

/* Neautorizat = rose */
.radio-pill.opt-noauth:has(input:checked) {
border-color: rgba(248,113,113,0.55);
background: rgba(248,113,113,0.10);
color: var(--accent-rose);
box-shadow: 0 0 16px rgba(248,113,113,0.15);
}
.radio-pill.opt-noauth input:checked ~ .radio-dot {
background: var(--accent-rose);
border-color: var(--accent-rose);
box-shadow: 0 0 8px rgba(248,113,113,0.6);
opacity: 1;
}

/* Signature */
.signature-wrap {
position: relative;
}

.signature-icon {
position: absolute;
right: 12px;
top: 50%;
transform: translateY(-50%);
font-size: 1rem;
opacity: 0.3;
pointer-events: none;
}

.signature-wrap input { padding-right: 36px; }

/* ── SECTION SPACER ── */
.section-spacer {
height: 1px;
background: linear-gradient(90deg, transparent, rgba(255,255,255,0.08), transparent);
margin: 36px 0 32px;
}

/* ── EMPTY STATE ── */
.empty-state {
text-align: center;
padding: 40px 20px;
color: var(--text-muted);
font-size: 0.85rem;
border: 1px dashed rgba(255,255,255,0.07);
border-radius: var(--radius-lg);
letter-spacing: 0.04em;
}

.empty-state .emoji { font-size: 2rem; display: block; margin-bottom: 10px; }

/* ── TOAST ── */
.toast {
position: fixed;
bottom: 24px;
right: 24px;
background: rgba(30,40,65,0.95);
border: 1px solid var(--glass-border);
border-radius: var(--radius-md);
padding: 12px 20px;
font-size: 0.82rem;
color: var(--text-primary);
box-shadow: 0 12px 40px rgba(0,0,0,0.5);
backdrop-filter: blur(20px);
z-index: 999;
animation: toastIn 0.3s ease;
max-width: 280px;
}

@keyframes toastIn {
from { opacity: 0; transform: translateY(20px); }
to   { opacity: 1; transform: translateY(0); }
}

.toast.fade-out { animation: toastOut 0.3s ease forwards; }
@keyframes toastOut {
to { opacity: 0; transform: translateY(10px); }
}

/* ── MOBILE ── */
@media (max-width: 600px) {
.card-body { grid-template-columns: 1fr; }
.header { flex-direction: column; }
.clock-card { text-align: left; width: 100%; }
.section-header { flex-direction: column; align-items: flex-start; }
}

/* Print friendly */
@media print {
body::before, body::after { display: none; }
.btn-add, .btn-icon, .card-actions { display: none !important; }
.card { border: 1px solid #ccc; background: white; color: black; }
label, input, textarea, select, .check-label { color: black; }
}
</style>

</head>
<body>

<div class="container">

  <!-- HEADER -->

  <div class="header">
    <div class="header-left">
      <h1>📦 Registru Depozit</h1>
      <p>Evidența intrărilor zilnice &amp; returnărilor</p>
    </div>
    <div class="clock-card">
      <div class="clock-time" id="clock">--:--:--</div>
      <div class="clock-date" id="clock-date">--</div>
    </div>
  </div>

  <!-- ══ SECȚIUNEA CAMIOANE ══ -->

  <div class="section-header">
    <div class="section-title">
      <span class="section-dot dot-blue"></span>
      Intrări camioane
      <span class="section-count" id="count-trucks">1 înregistrare</span>
    </div>
    <button class="btn-add" onclick="addTruck()">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      Adaugă camion
    </button>
  </div>

  <div id="trucks-list"></div>

  <!-- DIVIDER -->

  <div class="section-spacer"></div>

  <!-- ══ SECȚIUNEA RESI ══ -->

  <div class="section-header">
    <div class="section-title">
      <span class="section-dot dot-rose"></span>
      Returnări (Resi)
      <span class="section-count" id="count-resi">1 înregistrare</span>
    </div>
    <button class="btn-add btn-add-rose" onclick="addResi()">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      Adaugă returnare
    </button>
  </div>

  <div id="resi-list"></div>

</div>

<script>
// ── STATE ──
let trucks = [];
let resis = [];
let truckCount = 0;
let resiCount = 0;

// ── CLOCK ──
function updateClock() {
  const now = new Date();
  const zi = ['Duminică','Luni','Marți','Miercuri','Joi','Vineri','Sâmbătă'][now.getDay()];
  const luna = ['ianuarie','februarie','martie','aprilie','mai','iunie','iulie','august','septembrie','octombrie','noiembrie','decembrie'][now.getMonth()];
  document.getElementById('clock').textContent =
    now.toLocaleTimeString('ro-RO', { hour12: false });
  document.getElementById('clock-date').textContent =
    `${zi}, ${now.getDate()} ${luna} ${now.getFullYear()}`;
}
setInterval(updateClock, 1000);
updateClock();

// ── TIMESTAMP ──
function nowStamp() {
  const d = new Date();
  return d.toLocaleString('ro-RO', {
    day:'2-digit', month:'2-digit', year:'numeric',
    hour:'2-digit', minute:'2-digit', hour12: false
  });
}

// ── TOAST ──
function toast(msg) {
  const t = document.createElement('div');
  t.className = 'toast';
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(() => {
    t.classList.add('fade-out');
    setTimeout(() => t.remove(), 300);
  }, 2500);
}

// ── UPDATE COUNTS ──
function updateCounts() {
  const tc = trucks.length;
  const rc = resis.length;
  document.getElementById('count-trucks').textContent =
    tc === 0 ? 'nicio înregistrare' : tc === 1 ? '1 înregistrare' : `${tc} înregistrări`;
  document.getElementById('count-resi').textContent =
    rc === 0 ? 'nicio înregistrare' : rc === 1 ? '1 înregistrare' : `${rc} înregistrări`;
}

// ══════════════════════════════
//   TRUCKS
// ══════════════════════════════
function addTruck(data) {
  truckCount++;
  const id = 'truck-' + Date.now() + '-' + truckCount;
  const ts = nowStamp();
  const entry = data || { id, ts, firma: '', programat: false, bancal: false, cutii: false, comentariu: '', semnatura: '' };
  if (!data) entry.id = id;
  trucks.push(entry);
  renderTrucks();
  updateCounts();
  if (!data) toast('🚛 Înregistrare nouă adăugată');
}

function removeTruck(id) {
  if (!confirm('Ștergi această înregistrare?')) return;
  trucks = trucks.filter(t => t.id !== id);
  renderTrucks();
  updateCounts();
  toast('🗑️ Șters');
}

function renderTrucks() {
  const list = document.getElementById('trucks-list');
  list.innerHTML = '';

  if (trucks.length === 0) {
    list.innerHTML = `<div class="empty-state">
      <span class="emoji">🚛</span>
      Niciun camion înregistrat astăzi.<br>Apasă „Adaugă camion" pentru a începe.
    </div>`;
    return;
  }

  trucks.forEach((t, i) => {
    const card = document.createElement('div');
    card.className = 'card';
    card.id = t.id;
    card.innerHTML = `
      <div class="card-header">
        <span class="card-number">CAM #${String(i + 1).padStart(2,'0')}</span>
        <span class="card-timestamp">${t.ts}</span>
        <div class="card-actions">
          <button class="btn-icon delete" title="Șterge" onclick="removeTruck('${t.id}')">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6M14 11v6"/><path d="M9 6V4h6v2"/></svg>
          </button>
        </div>
      </div>
      <div class="card-body">
        <div class="field full">
          <label>Firma / Furnizor</label>
          <input type="text" placeholder="ex: KOH-I-NOOR, Bic, Staedtler…" value="${t.firma}"
            onchange="updateTruck('${t.id}', 'firma', this.value)">
        </div>

        <div class="field">
          <label>Status livrare</label>
          <div class="radio-group">
            <label class="radio-pill opt-yes">
              <input type="radio" name="prog-${t.id}" value="programat" ${t.programat === 'programat' ? 'checked' : ''} onchange="updateTruck('${t.id}', 'programat', this.value)">
              <span class="radio-dot"></span>
              <span class="radio-text">Programat</span>
            </label>
            <label class="radio-pill opt-no">
              <input type="radio" name="prog-${t.id}" value="neprogramat" ${t.programat === 'neprogramat' ? 'checked' : ''} onchange="updateTruck('${t.id}', 'programat', this.value)">
              <span class="radio-dot"></span>
              <span class="radio-text">Neprogramat</span>
            </label>
            <label class="radio-pill opt-unknown">
              <input type="radio" name="prog-${t.id}" value="necunoscut" ${t.programat === 'necunoscut' ? 'checked' : ''} onchange="updateTruck('${t.id}', 'programat', this.value)">
              <span class="radio-dot"></span>
              <span class="radio-text">Necunoscut</span>
            </label>
          </div>
        </div>

        <div class="field">
          <label>Tip marfă</label>
          <div class="check-group">
            <label class="check-label bancal">
              <input type="checkbox" ${t.bancal ? 'checked' : ''} onchange="updateTruck('${t.id}', 'bancal', this.checked)">
              <span class="check-box">${t.bancal ? '✓' : ''}</span>
              <span class="check-text">Bancal</span>
            </label>
            <label class="check-label bancal">
              <input type="checkbox" ${t.cutii ? 'checked' : ''} onchange="updateTruck('${t.id}', 'cutii', this.checked)">
              <span class="check-box">${t.cutii ? '✓' : ''}</span>
              <span class="check-text">Cutii</span>
            </label>
          </div>
        </div>

        <div class="field full">
          <label>Comentariu</label>
          <textarea placeholder="Observații, daune, lipsuri…" onchange="updateTruck('${t.id}', 'comentariu', this.value)">${t.comentariu}</textarea>
        </div>

        <div class="field">
          <label>Semnătura responsabil</label>
          <div class="signature-wrap">
            <input type="text" placeholder="Numele celui care a ridicat" value="${t.semnatura}"
              onchange="updateTruck('${t.id}', 'semnatura', this.value)">
            <span class="signature-icon">✍️</span>
          </div>
        </div>
      </div>
    `;
    list.appendChild(card);
  });
}

function updateTruck(id, field, val) {
  const t = trucks.find(x => x.id === id);
  if (t) {
    t[field] = val;
    if (field === 'bancal' || field === 'cutii') {
      renderTrucks();
    }
  }
}

// ══════════════════════════════
//   RESI
// ══════════════════════════════
function addResi(data) {
  resiCount++;
  const id = 'resi-' + Date.now() + '-' + resiCount;
  const ts = nowStamp();
  const entry = data || { id, ts, descriere: '', autorizat: false, comentariu: '', semnatura: '' };
  if (!data) entry.id = id;
  resis.push(entry);
  renderResis();
  updateCounts();
  if (!data) toast('📦 Returnare adăugată');
}

function removeResi(id) {
  if (!confirm('Ștergi această returnare?')) return;
  resis = resis.filter(r => r.id !== id);
  renderResis();
  updateCounts();
  toast('🗑️ Șters');
}

function renderResis() {
  const list = document.getElementById('resi-list');
  list.innerHTML = '';

  if (resis.length === 0) {
    list.innerHTML = `<div class="empty-state"> <span class="emoji">↩️</span> Nicio returnare înregistrată.<br>Apasă „Adaugă returnare" pentru a începe. </div>`;
    return;
  }

  resis.forEach((r, i) => {
    const card = document.createElement('div');
    card.className = 'card';
    card.id = r.id;
    card.style.borderColor = 'rgba(248,113,113,0.12)';
    card.innerHTML = `
      <div class="card-header">
        <span class="card-number" style="color: var(--accent-rose); border-color: rgba(248,113,113,0.2); background: rgba(248,113,113,0.06);">RESI #${String(i + 1).padStart(2,'0')}</span>
        <span class="card-timestamp">${r.ts}</span>
        <div class="card-actions">
          <button class="btn-icon delete" title="Șterge" onclick="removeResi('${r.id}')">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6M14 11v6"/><path d="M9 6V4h6v2"/></svg>
          </button>
        </div>
      </div>
      <div class="card-body">
        <div class="field full">
          <label>Descriere pachete returnate</label>
          <input type="text" placeholder="ex: 3 colete Bic, referință…" value="${r.descriere}"
            onchange="updateResi('${r.id}', 'descriere', this.value)">
        </div>

        <div class="field">
          <label>Autorizare returnare</label>
          <div class="radio-group">
            <label class="radio-pill opt-auth">
              <input type="radio" name="auth-${r.id}" value="autorizat" ${r.autorizat === 'autorizat' ? 'checked' : ''} onchange="updateResi('${r.id}', 'autorizat', this.value)">
              <span class="radio-dot"></span>
              <span class="radio-text">Autorizată</span>
            </label>
            <label class="radio-pill opt-noauth">
              <input type="radio" name="auth-${r.id}" value="neautorizat" ${r.autorizat === 'neautorizat' ? 'checked' : ''} onchange="updateResi('${r.id}', 'autorizat', this.value)">
              <span class="radio-dot"></span>
              <span class="radio-text">Neautorizată</span>
            </label>
            <label class="radio-pill opt-unknown">
              <input type="radio" name="auth-${r.id}" value="necunoscut" ${r.autorizat === 'necunoscut' ? 'checked' : ''} onchange="updateResi('${r.id}', 'autorizat', this.value)">
              <span class="radio-dot"></span>
              <span class="radio-text">Necunoscut</span>
            </label>
          </div>
        </div>

        <div class="field full">
          <label>Comentariu</label>
          <textarea placeholder="Motivul returnării, stare pachet…" onchange="updateResi('${r.id}', 'comentariu', this.value)">${r.comentariu}</textarea>
        </div>

        <div class="field">
          <label>Semnătura responsabil</label>
          <div class="signature-wrap">
            <input type="text" placeholder="Numele celui care a ridicat" value="${r.semnatura}"
              onchange="updateResi('${r.id}', 'semnatura', this.value)">
            <span class="signature-icon">✍️</span>
          </div>
        </div>
      </div>
    `;
    list.appendChild(card);
  });
}

function updateResi(id, field, val) {
  const r = resis.find(x => x.id === id);
  if (r) {
    r[field] = val;
    if (field === 'autorizat') {
      renderResis();
    }
  }
}

// ── INIT: start with 1 row each ──
addTruck();
addResi();
</script>

</body>
</html>
